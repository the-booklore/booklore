when:
  event:
    - push
  branch:
    - main
    - master
    - feature/auto-add-books-to-kobo-shelf

steps:
  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: registry.registry.svc.cluster.local:5000
      repo: booklore
      tags: ${CI_COMMIT_SHA:0:8}
      dockerfile: Dockerfile
      insecure: true
      skip_tls_verify: true
      build_args:
        - APP_VERSION=${CI_COMMIT_SHA:0:8}
        - APP_REVISION=${CI_COMMIT_SHA}

  - name: update-homelab
    image: alpine/git
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - git config --global user.email "woodpecker@ci.local"
      - git config --global user.name "Woodpecker CI"
      - git clone --depth 1 "https://x-access-token:$${GITHUB_TOKEN}@github.com/armandocerna/argocd-homelab.git" /tmp/homelab
      - cd /tmp/homelab
      - 'sed -i "s/newTag:.*/newTag: \"${CI_COMMIT_SHA:0:8}\"/" booklore/kustomization.yaml'
      - git add booklore/kustomization.yaml
      - 'git commit -m "Update booklore image to ${CI_COMMIT_SHA:0:8}"'
      - git push

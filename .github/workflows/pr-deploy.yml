name: Deploy PR Preview

on:
  # 1. The Standard Trigger (Requires file to be in default branch)
  issue_comment:
    types: [created]

  # 2. The TEST Trigger (Allows you to run this MANUALLY from your PR branch)
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to Deploy (e.g., 54)'
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

# Prevent concurrent deploys for the same PR
concurrency:
  group: deploy-pr-${{ github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  deploy:
    # Run if:
    # 1. It is a manual run (workflow_dispatch)
    # OR
    # 2. It is a comment containing '/deploy' AND not from a bot
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/deploy') &&
        github.event.comment.user.type != 'Bot'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      # --- SETUP ENV VARS (Handles both Manual & Comment triggers) ---
      - name: Set PR Environment Variables
        id: pr-env
        run: |
          # Determine PR Number based on trigger type
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            echo "Triggered Manually for PR: $PR_NUMBER"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
            echo "Triggered by Comment for PR: $PR_NUMBER"
          fi

          echo "PR_NUM=$PR_NUMBER" >> $GITHUB_ENV
          echo "pr_num=$PR_NUMBER" >> $GITHUB_OUTPUT
          
          # Calculate Port (6000 + 54 = 6054)
          APP_PORT=$((6000 + PR_NUMBER))
          echo "app_port=$APP_PORT" >> $GITHUB_OUTPUT

      # --- FEEDBACK (Only works for Comments) ---
      - name: Add 'Eyes' Reaction
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      # --- CHECKOUT LOGIC (The Tricky Part) ---

      # Scenario A: Comment Trigger (Runs on default branch, need to fetch PR branch)
      - name: Get PR Branch Info (Comment Trigger)
        if: github.event_name == 'issue_comment'
        uses: xt0rted/pull-request-comment-branch@v2
        id: comment-branch

      # Scenario A Checkout
      - name: Checkout Code (Comment Trigger)
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.comment-branch.outputs.head_ref }}

      # Scenario B: Manual Trigger (Runs on the PR branch itself)
      - name: Checkout Code (Manual Trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        # No 'ref' needed, it checks out the branch you selected in the UI

      - name: Get commit hash
        id: commit-hash
        run: |
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "short=$COMMIT_HASH" >> $GITHUB_OUTPUT

      # --- BUILD & DEPLOY (Same for both) ---

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Check if image exists
        id: check-image
        env:
          IMAGE_TAG: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ env.PR_NUM }}-${{ steps.commit-hash.outputs.short }}
        run: |
          if docker manifest inspect "$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Build and Push (ARM64)
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./testing/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ env.PR_NUM }}-${{ steps.commit-hash.outputs.short }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ env.PR_NUM }}-latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache,mode=max

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to VPS
        env:
          PR_NUM: ${{ env.PR_NUM }}
          APP_PORT: ${{ steps.pr-env.outputs.app_port }}
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
          COMMIT_SHORT: ${{ steps.commit-hash.outputs.short }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          UNIQUE_NAME="docker-compose-pr-${PR_NUM}-${GITHUB_RUN_ID}.yml"
          
          # Create Docker Compose file
          cat > "$UNIQUE_NAME" << EOF
          services:
            booklore:
              image: ${DOCKER_USER}/booklore:pr-${PR_NUM}-${COMMIT_SHORT}
              container_name: booklore-pr-${PR_NUM}
              environment:
                - TZ=Etc/UTC
                - SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/booklore?useSSL=false&allowPublicKeyRetrieval=true
                - SPRING_DATASOURCE_USERNAME=booklore
                - SPRING_DATASOURCE_PASSWORD=pr_pass_${PR_NUM}
                - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver
                - SPRING_JPA_HIBERNATE_DDL_AUTO=update
              depends_on:
                mariadb:
                  condition: service_healthy
              ports:
                - "${APP_PORT}:6060"
              volumes:
                - ./data:/app/data
                - ./books:/books
                - ./bookdrop:/bookdrop
              restart: on-failure:5
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:6060/actuator/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 90s

            mariadb:
              image: lscr.io/linuxserver/mariadb:11.4.5
              container_name: mariadb-pr-${PR_NUM}
              environment:
                - PUID=1000
                - PGID=1000
                - TZ=Etc/UTC
                - MYSQL_ROOT_PASSWORD=pr_root_${PR_NUM}
                - MYSQL_DATABASE=booklore
                - MYSQL_USER=booklore
                - MYSQL_PASSWORD=pr_pass_${PR_NUM}
              volumes:
                - ./mariadb_data:/config
              healthcheck:
                test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
                interval: 5s
                timeout: 5s
                retries: 10
          EOF
          
          # Transfer and Deploy
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$UNIQUE_NAME" "${VPS_USER}@${VPS_HOST}:/tmp/${UNIQUE_NAME}"
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" << ENDSSH
            mkdir -p ~/deployments/pr-${PR_NUM}/{data,books,bookdrop,mariadb_data}
            mv /tmp/${UNIQUE_NAME} ~/deployments/pr-${PR_NUM}/docker-compose.yml
            cd ~/deployments/pr-${PR_NUM}
            docker compose down || true
            docker compose pull
            docker compose up -d
            docker image prune -af --filter "until=168h" || true
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      # --- NOTIFICATIONS (Works for both) ---

      - name: Comment Success
        if: success()
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ env.PR_NUM }}
          APP_PORT: ${{ steps.pr-env.outputs.app_port }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          COMMIT_SHORT: ${{ steps.commit-hash.outputs.short }}
          IMAGE_EXISTS: ${{ steps.check-image.outputs.exists }}
        with:
          script: |
            const cached = process.env.IMAGE_EXISTS === 'true';
            const buildNote = cached ? '📦 *Used cached image*' : '🔨 *Built new image*';
            
            // Add emoji to request comment if it exists
            if (context.eventName === 'issue_comment') {
                await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket'
                });
            }

            // Post new comment with details
            await github.rest.issues.createComment({
              issue_number: parseInt(process.env.PR_NUM),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **PR Preview Deployed!**\n\n` +
                    `| Resource | Value |\n` +
                    `|----------|-------|\n` +
                    `| 📚 **URL** | http://${process.env.VPS_HOST}:${process.env.APP_PORT} |\n` +
                    `| 🏷️ **Commit** | \`${process.env.COMMIT_SHORT}\` |\n` +
                    `| 🐳 **Port** | ${process.env.APP_PORT} |\n\n` +
                    `${buildNote}\n\n` +
                    `⚠️ *Firewall port ${process.env.APP_PORT} must be open.*`
            });

      - name: Report Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'issue_comment') {
                await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: '-1'
                });
            }
            
            // If manual trigger, we still want a comment on the PR
            const prNum = parseInt(process.env.PR_NUM || 0);
            if (prNum > 0) {
                await github.rest.issues.createComment({
                issue_number: prNum,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `❌ **Deployment Failed!**\n\nCheck the [workflow logs](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`
                });
            }
name: Large File Upload Regression Test

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  upload-test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: booklore
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -ptestroot --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mariadb-admin ping -h 127.0.0.1 -uroot -ptestroot --silent 2>/dev/null; then
              echo "MariaDB is ready"
              break
            fi
            sleep 2
          done

      - name: Setup test user
        run: |
          # Wait for MariaDB to be ready
          for i in {1..30}; do
            if mariadb-admin ping -h 127.0.0.1 -uroot -ptestroot --silent 2>/dev/null; then
              break
            fi
            sleep 2
          done

          # Install Python and bcrypt for password hashing
          sudo apt-get install -y python3 python3-pip
          pip3 install bcrypt

          # Generate BCrypt hash for password 'testpass'
          BCRYPT_HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'testpass', bcrypt.gensalt()).decode('utf-8'))")

          # Create test user with BCrypt hashed password and required permissions
          mariadb -h 127.0.0.1 -uroot -ptestroot booklore << EOF
            -- Note: Flyway will create the proper schema, but we need to ensure it's created
            CREATE TABLE IF NOT EXISTS book_lore_user (
              id BIGINT PRIMARY KEY AUTO_INCREMENT,
              username VARCHAR(255) UNIQUE NOT NULL,
              name VARCHAR(255) NOT NULL,
              email VARCHAR(255) UNIQUE NOT NULL,
              password_hash VARCHAR(255) NOT NULL,
              is_default_password BOOLEAN DEFAULT FALSE,
              provisioning_method VARCHAR(50),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );

            CREATE TABLE IF NOT EXISTS user_permissions (
              id BIGINT PRIMARY KEY AUTO_INCREMENT,
              user_id BIGINT NOT NULL,
              permission_upload BOOLEAN DEFAULT FALSE,
              permission_download BOOLEAN DEFAULT FALSE,
              permission_edit_metadata BOOLEAN DEFAULT FALSE,
              permission_manipulate_library BOOLEAN DEFAULT FALSE,
              permission_email_book BOOLEAN DEFAULT FALSE,
              permission_delete_book BOOLEAN DEFAULT FALSE,
              permission_access_opds BOOLEAN DEFAULT FALSE,
              permission_sync_koreader BOOLEAN DEFAULT FALSE,
              permission_sync_kobo BOOLEAN DEFAULT FALSE,
              permission_admin BOOLEAN DEFAULT FALSE,
              UNIQUE KEY uk_user_permissions (user_id),
              FOREIGN KEY (user_id) REFERENCES book_lore_user(id) ON DELETE CASCADE
            );

            -- Insert test user with BCrypt hashed password
            INSERT IGNORE INTO book_lore_user (username, name, email, password_hash, is_default_password, provisioning_method)
            VALUES ('test-user', 'Test User', 'test@example.com', '$BCRYPT_HASH', FALSE, 'LOCAL');

            -- Get the user ID
            SET @user_id = (SELECT id FROM book_lore_user WHERE username = 'test-user');

            -- Grant all permissions for upload testing
            INSERT IGNORE INTO user_permissions (user_id, permission_upload, permission_download, permission_admin)
            VALUES (@user_id, TRUE, TRUE, TRUE)
            ON DUPLICATE KEY UPDATE 
              permission_upload = TRUE,
              permission_download = TRUE,
              permission_admin = TRUE;
          EOF

          echo "Test user created with BCrypt password for upload testing"

      - name: Build and start application
        id: start_app
        working-directory: booklore-api
        env:
          SPRING_DATASOURCE_URL: jdbc:mariadb://127.0.0.1:3306/booklore
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testroot
          SPRING_FLYWAY_ENABLED: 'true'
        run: |
          # Build the application
          chmod +x ./gradlew
          ./gradlew bootJar -x test --no-daemon

          # Find the JAR
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          echo "Starting: $JAR_FILE"

          # Start in background
          java -jar "$JAR_FILE" \
            --spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/booklore \
            --spring.datasource.username=root \
            --spring.datasource.password=testroot \
            --app.bookdrop-folder=/tmp/bookdrop \
            --app.path-config=/tmp/booklore-data \
            > /tmp/booklore.log 2>&1 &

          echo $! > /tmp/booklore.pid
          echo "pid=$(cat /tmp/booklore.pid)" >> $GITHUB_OUTPUT

          # Wait for startup
          for i in {1..60}; do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Application started"
              break
            fi
            echo "Waiting for app to start... ($i/60)"
            sleep 3
          done
          echo "App is ready"

      - name: Capture App Logs on Failure
        if: failure()
        run: |
          cat /tmp/booklore.log || echo "No log file found"

      - name: Upload App Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: booklore-app-logs
          path: /tmp/booklore.log
          retention-days: 7

      - name: Authenticate and Run Large File Upload Test
        run: |
          # Install jq for JSON parsing
          sudo apt-get install -y jq
          
          # Wait for application to be fully ready (auth endpoint available)
          echo "Waiting for auth endpoint to be available..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8080/api/v1/auth/login > /dev/null 2>&1 || \
               curl -s http://localhost:8080/api/v1/auth/login 2>&1 | grep -q "400\|405\|401"; then
              echo "Auth endpoint is ready"
              break
            fi
            echo "Waiting for auth endpoint... ($i/30)"
            sleep 2
          done
          
          # Additional wait to ensure database is ready
          sleep 5
          
          # Login to get JWT token
          echo "Logging in as test-user..."
          LOGIN_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"test-user","password":"testpass"}')
          
          HTTP_CODE=$(echo "$LOGIN_RESPONSE" | tail -n1)
          BODY=$(echo "$LOGIN_RESPONSE" | sed '$d')
          
          echo "Login HTTP Status: $HTTP_CODE"
          echo "Login response body: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAILURE: Login failed with HTTP $HTTP_CODE"
            echo "Full response: $LOGIN_RESPONSE"
            exit 1
          fi
          
          # Extract access token using jq
          ACCESS_TOKEN=$(echo "$BODY" | jq -r '.accessToken // empty')
          
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "FAILURE: Could not extract access token from response"
            echo "Response body: $BODY"
            exit 1
          fi
          
          echo "Successfully authenticated (token length: ${#ACCESS_TOKEN})"
          
          # Run upload test with authentication
          chmod +x booklore-api/testing/large_upload_test.sh
          # Target the bookdrop upload which usually handles large raw imports
          ./booklore-api/testing/large_upload_test.sh "http://localhost:8080/api/v1/files/upload/bookdrop" "$ACCESS_TOKEN"

      - name: Stop Application
        if: always()
        run: |
          if [ -f /tmp/booklore.pid ]; then
            kill $(cat /tmp/booklore.pid) 2>/dev/null || true
          fi


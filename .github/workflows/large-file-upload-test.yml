name: Large File Upload Regression Test

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  upload-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create test network
        run: |
          docker network create booklore-test-net || true

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Don't push to registry, just build locally
          tags: booklore-api-test:latest
          load: true # Load image into Docker daemon

      - name: Start MariaDB
        run: |
          docker run -d \
            --name mariadb-test \
            --network booklore-test-net \
            -e MYSQL_ROOT_PASSWORD=testroot \
            -e MYSQL_DATABASE=booklore \
            -e MYSQL_USER=booklore \
            -e MYSQL_PASSWORD=booklore \
            mariadb:10.11

          # Wait for MariaDB to be ready
          for i in {1..30}; do
            if docker exec mariadb-test mariadb-admin ping -h localhost -uroot -ptestroot 2>/dev/null; then
              echo "MariaDB is ready"
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done

      - name: Run Application in Docker Container
        id: run_app_container
        run: |
          docker run -d \
            --name booklore-app \
            --network booklore-test-net \
            -p 8080:6060 \
            -e DATABASE_URL=jdbc:mariadb://mariadb-test:3306/booklore \
            -e DATABASE_USERNAME=booklore \
            -e DATABASE_PASSWORD=booklore \
            booklore-api-test:latest

          # Wait a bit to allow the container to start
          sleep 10

          # Check if the container is running
          echo "Checking if container is running..."
          docker ps

          # Try to check the health endpoint
          echo "Attempting health check..."
          timeout 300 bash -c 'while true; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            echo "Health check response: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              curl -s http://localhost:8080/actuator/health
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done'

      - name: Capture App Logs on Failure
        if: failure() && steps.run_app_container.outcome == 'failure'
        run: |
          docker logs booklore-app > booklore-app.log
        
      - name: Upload App Logs on Failure
        if: failure() && steps.run_app_container.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: booklore-app-logs
          path: booklore-app.log
          retention-days: 7

      - name: Run Large File Upload Test
        run: |
          chmod +x booklore-api/testing/large_upload_test.sh
          # Target the bookdrop upload which usually handles large raw imports
          ./booklore-api/testing/large_upload_test.sh "http://localhost:8080/api/v1/files/upload/bookdrop"
      
      - name: Stop Application
        if: always()
        run: |
          docker rm -f booklore-app mariadb-test 2>/dev/null || true
          docker network rm booklore-test-net 2>/dev/null || true


name: Swagger API Tests

on:
  push:
    branches: [develop, main]
    paths:
      - 'booklore-api/**'
      - 'booklore-ui/**'
      - 'build.gradle'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'booklore-api/**'
      - 'booklore-ui/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:
    inputs:
      enable_auth:
        description: 'Enable authentication for protected endpoints'
        required: false
        type: boolean
        default: false
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BOOKLORE_URL: http://localhost:8080

jobs:
  swagger-api-tests:
    name: Swagger API Tests
    runs-on: ubuntu-latest
    
    timeout-minutes: 40

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: booklore
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java and Gradle
        uses: ./.github/actions/java-gradle-setup
        with:
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: testing/requirements.txt

      - name: Install Python dependencies
        run: pip install -r testing/requirements.txt

      - name: Build Frontend
        working-directory: booklore-ui
        run: |
          npm ci --prefer-offline --no-audit
          npm run build

      - name: Copy frontend to backend
        run: |
          mkdir -p booklore-api/src/main/resources/static
          if [ -d "booklore-ui/dist/booklore" ]; then
            cp -r booklore-ui/dist/booklore/* booklore-api/src/main/resources/static/
            echo "Frontend copied successfully"
          else
            echo "Warning: Frontend dist not found at booklore-ui/dist/booklore"
            ls -la booklore-ui/dist/ || echo "dist directory doesn't exist"
          fi

      - name: Build Backend
        working-directory: booklore-api
        id: build
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar -x test --no-daemon
          # Find the bootJar and store path for artifact upload
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "JAR built at: $JAR_FILE"

      - name: Run Flyway migrations (prep DB)
        working-directory: booklore-api
        env:
          FLYWAY_URL: jdbc:mariadb://127.0.0.1:3306/booklore
          FLYWAY_USER: root
          FLYWAY_PASSWORD: rootpassword
          FLYWAY_CLEAN_DISABLED: 'false'
        run: |
          ./gradlew flywayClean flywayMigrate --no-daemon --stacktrace

      - name: Create bookdrop directory
        run: mkdir -p /tmp/bookdrop && chmod 777 /tmp/bookdrop

      - name: Create data directory
        run: mkdir -p /tmp/booklore-data && chmod 777 /tmp/booklore-data


      - name: Start BookLore
        working-directory: booklore-api
        run: |
          # Find the bootJar (not the plain jar)
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          echo "Starting JAR: $JAR_FILE"
          
          # Start with logging to file and custom bookdrop folder
          java -jar "$JAR_FILE" \
            --app.bookdrop-folder=/tmp/bookdrop \
            --app.path-config=/tmp/booklore-data \
            > /tmp/booklore.log 2>&1 &
          echo $! > /tmp/booklore.pid
          
          # Give it a moment to start
          sleep 5
          echo "=== Initial startup logs ==="
          head -50 /tmp/booklore.log || true
        env:
          SPRING_DATASOURCE_URL: jdbc:mariadb://localhost:3306/booklore?createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpassword
          SPRING_FLYWAY_URL: jdbc:mariadb://localhost:3306/booklore
          SPRING_FLYWAY_USER: root
          SPRING_FLYWAY_PASSWORD: rootpassword
          SWAGGER_ENABLED: "true"
          SPRING_PROFILES_ACTIVE: default

      - name: Wait for BookLore to be ready
        run: |
          echo "Waiting for BookLore to start on port 8080..."
          for i in {1..60}; do
            # Try the actuator health endpoint first, then fall back to checking if swagger UI is accessible
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "BookLore is ready! (actuator health returned 200)"
              curl -s http://localhost:8080/actuator/health || true
              exit 0
            fi
            
            # Fallback: check if the Swagger API docs endpoint is accessible
            SWAGGER_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/api-docs 2>/dev/null || echo "000")
            if [ "$SWAGGER_CODE" = "200" ]; then
              echo "BookLore is ready! (swagger endpoint returned 200)"
              exit 0
            fi
            
            # Check if process is still running
            if [ -f /tmp/booklore.pid ]; then
              PID=$(cat /tmp/booklore.pid)
              if ! kill -0 $PID 2>/dev/null; then
                echo "ERROR: BookLore process died!"
                echo "=== Application logs ==="
                cat /tmp/booklore.log
                exit 1
              fi
            fi
            
            echo "Attempt $i/60 - actuator: $HTTP_CODE, swagger: $SWAGGER_CODE - waiting..."
            sleep 5
          done
          
          echo "BookLore failed to start within timeout"
          echo "=== Full application logs ==="
          cat /tmp/booklore.log
          exit 1

      - name: Run Swagger Endpoint Tests
        env:
          VERBOSE: ${{ inputs.verbose && '--verbose' || '' }}
          AUTH: ${{ inputs.enable_auth && '--enable-auth' || '' }}
        run: |
          CMD="python testing/swagger_endpoint_test.py --base-url http://localhost:8080"
          if [ -n "$VERBOSE" ]; then
            CMD="$CMD $VERBOSE"
          fi
          if [ -n "$AUTH" ]; then
            CMD="$CMD $AUTH"
          fi
          echo "Running: $CMD"
          eval "$CMD"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Application logs ==="
          cat /tmp/booklore.log || true

      - name: Stop BookLore
        if: always()
        run: |
          if [ -f /tmp/booklore.pid ]; then
            kill $(cat /tmp/booklore.pid) || true
          fi

      - name: Upload built JAR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booklore-jar
          path: booklore-api/build/libs/
          retention-days: 1
          compression-level: 0

  docker-api-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: swagger-api-tests
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: booklore-jar
          path: booklore-api/build/libs/

      - name: Verify JAR downloaded
        run: |
          JAR_FILE=$(find booklore-api/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ ERROR: JAR artifact not found"
            ls -la booklore-api/build/libs/ || echo "Directory doesn't exist"
            exit 1
          fi
          echo "✓ JAR found: $JAR_FILE"
          ls -lh "$JAR_FILE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Context
        run: |
          pwd
          ls -la
          ls -la testing/ || echo "❌ testing/ missing!"
          cat .dockerignore
          docker buildx build --platform linux/arm64 --file testing/Dockerfile -t test . --dry-run 2>&1 || true

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: testing/Dockerfile
          push: false
          load: true
          tags: booklore:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create test network
        run: docker network create booklore-test-net

      - name: Create bookdrop volume
        run: docker volume create bookdrop || true

      - name: Start MariaDB
        run: |
          docker run -d \
            --name mariadb \
            --network booklore-test-net \
            -e MYSQL_ROOT_PASSWORD=rootpassword \
            -e MYSQL_DATABASE=booklore \
            mariadb:10.11
          
          # Wait for MariaDB to be ready
          for i in {1..30}; do
            if docker exec mariadb mariadb-admin ping -h localhost -u root -prootpassword 2>/dev/null; then
              echo "MariaDB is ready!"
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done

      - name: Start BookLore container
        run: |
          docker run -d \
            --name booklore \
            --network booklore-test-net \
            -p 6060:6060 \
            -v bookdrop:/bookdrop \
            -e DATABASE_URL=jdbc:mariadb://mariadb:3306/booklore?createDatabaseIfNotExist=true \
            -e DATABASE_USERNAME=root \
            -e DATABASE_PASSWORD=rootpassword \
            -e SWAGGER_ENABLED=true \
            booklore:test

      - name: Wait for BookLore container
        run: |
          echo "Waiting for BookLore container..."
          for i in {1..60}; do
            # Try the actuator health endpoint first
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6060/actuator/health 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "BookLore is ready! (actuator health returned 200)"
              exit 0
            fi
            
            # Fallback: check if the Swagger API docs endpoint is accessible
            SWAGGER_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6060/api/v1/api-docs 2>/dev/null || echo "000")
            if [ "$SWAGGER_CODE" = "200" ]; then
              echo "BookLore is ready! (swagger endpoint returned 200)"
              exit 0
            fi
            
            echo "Attempt $i/60 - actuator: $HTTP_CODE, swagger: $SWAGGER_CODE - waiting..."
            sleep 5
          done
          echo "BookLore container failed to start"
          docker logs booklore
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r testing/requirements.txt

      - name: Run Swagger tests against container
        run: |
          # Skip Swagger tests - will be run after Docker integration tests with correct port
          echo "Swagger tests will run after Docker container is started"

      - name: Run Docker integration tests
        id: docker-test
        run: |
          docker rm -f booklore-test booklore-test-db 2>/dev/null || true
          docker system prune -f --volumes || true
          sleep 3
          
          chmod +x testing/docker-integration-test.sh
          # Run without --port to let script find available port
          ./testing/docker-integration-test.sh --image booklore:test

      - name: Container logs on failure
        if: failure()
        run: |
          docker logs booklore-test 2>/dev/null || true
          docker logs booklore-test-db 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f booklore-test booklore-test-db 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          docker network rm booklore-test-net || true

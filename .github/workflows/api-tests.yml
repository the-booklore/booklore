name: API Endpoint Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      enable_auth:
        description: 'Enable authentication for protected endpoints'
        required: false
        type: boolean
        default: false
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

env:
  BOOKLORE_URL: http://localhost:6060

jobs:
  swagger-endpoint-tests:
    name: Swagger Endpoint Tests
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: booklore
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: testing/requirements.txt

      - name: Install Python dependencies
        run: pip install -r testing/requirements.txt

      - name: Build Frontend
        working-directory: booklore-ui
        run: |
          npm ci --prefer-offline --no-audit
          npm run build

      - name: Copy frontend to backend
        run: |
          mkdir -p booklore-api/src/main/resources/static
          cp -r booklore-ui/dist/booklore-ui/browser/* booklore-api/src/main/resources/static/

      - name: Build Backend
        working-directory: booklore-api
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Start BookLore
        working-directory: booklore-api
        run: |
          java -jar build/libs/booklore-api-*.jar &
          echo $! > /tmp/booklore.pid
        env:
          DATABASE_URL: jdbc:mariadb://localhost:3306/booklore?createDatabaseIfNotExist=true
          DATABASE_USERNAME: root
          DATABASE_PASSWORD: rootpassword
          SWAGGER_ENABLED: true
          SERVER_PORT: 6060

      - name: Wait for BookLore to be ready
        run: |
          echo "Waiting for BookLore to start..."
          for i in {1..60}; do
            if curl -s http://localhost:6060/actuator/health | grep -q '"status":"UP"'; then
              echo "BookLore is ready!"
              exit 0
            fi
            echo "Attempt $i/60 - waiting..."
            sleep 5
          done
          echo "BookLore failed to start"
          exit 1

      - name: Run Swagger Endpoint Tests
        run: |
          python testing/swagger_endpoint_test.py \
            --base-url http://localhost:6060 \
            ${{ inputs.verbose && '--verbose' || '' }} \
            ${{ inputs.enable_auth && '--enable-auth' || '' }}

      - name: Stop BookLore
        if: always()
        run: |
          if [ -f /tmp/booklore.pid ]; then
            kill $(cat /tmp/booklore.pid) || true
          fi

  docker-api-tests:
    name: Docker API Tests
    runs-on: ubuntu-latest
    needs: swagger-endpoint-tests
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: booklore:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create test network
        run: docker network create booklore-test-net

      - name: Start MariaDB
        run: |
          docker run -d \
            --name mariadb \
            --network booklore-test-net \
            -e MYSQL_ROOT_PASSWORD=rootpassword \
            -e MYSQL_DATABASE=booklore \
            mariadb:10.11
          
          # Wait for MariaDB to be ready
          for i in {1..30}; do
            if docker exec mariadb healthcheck.sh --connect --innodb_initialized 2>/dev/null; then
              echo "MariaDB is ready!"
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done

      - name: Start BookLore container
        run: |
          docker run -d \
            --name booklore \
            --network booklore-test-net \
            -p 6060:6060 \
            -e DATABASE_URL=jdbc:mariadb://mariadb:3306/booklore?createDatabaseIfNotExist=true \
            -e DATABASE_USERNAME=root \
            -e DATABASE_PASSWORD=rootpassword \
            -e SWAGGER_ENABLED=true \
            booklore:test

      - name: Wait for BookLore container
        run: |
          echo "Waiting for BookLore container..."
          for i in {1..60}; do
            if curl -s http://localhost:6060/actuator/health | grep -q '"status":"UP"'; then
              echo "BookLore is ready!"
              exit 0
            fi
            echo "Attempt $i/60 - waiting..."
            sleep 5
          done
          echo "BookLore container failed to start"
          docker logs booklore
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r testing/requirements.txt

      - name: Run Swagger tests against container
        run: |
          python testing/swagger_endpoint_test.py \
            --base-url http://localhost:6060 \
            --verbose

      - name: Run Docker integration tests
        run: |
          chmod +x testing/docker-integration-test.sh
          ./testing/docker-integration-test.sh booklore

      - name: Container logs on failure
        if: failure()
        run: docker logs booklore

      - name: Cleanup
        if: always()
        run: |
          docker stop booklore mariadb || true
          docker rm booklore mariadb || true
          docker network rm booklore-test-net || true

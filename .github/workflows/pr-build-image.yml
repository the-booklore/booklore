name: PR Build Docker Image

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to build (leave empty for current branch)'
        required: false

concurrency:
  group: pr-build-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-image:
    name: Build Multi-Arch Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      commit_hash: ${{ steps.commit-hash.outputs.short }}
      pr_number: ${{ steps.pr-info.outputs.pr_number }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Get PR Info
        id: pr-info
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "ref=$PR_HEAD_REF" >> $GITHUB_OUTPUT
            echo "sha=$PR_HEAD_SHA" >> $GITHUB_OUTPUT
          elif [ -n "$INPUT_PR_NUMBER" ]; then
            echo "pr_number=$INPUT_PR_NUMBER" >> $GITHUB_OUTPUT
            echo "ref=$GITHUB_REF" >> $GITHUB_OUTPUT
            echo "sha=" >> $GITHUB_OUTPUT
          else
            echo "pr_number=0" >> $GITHUB_OUTPUT
            echo "ref=$GITHUB_REF" >> $GITHUB_OUTPUT
            echo "sha=" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.sha || github.ref }}

      - name: Get commit hash
        id: commit-hash
        run: |
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "short=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "full=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "Commit hash: $COMMIT_HASH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore
          tags: |
            type=raw,value=pr-${{ steps.pr-info.outputs.pr_number }}

      - name: Build and Push Docker Image
        timeout-minutes: 30
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-arm64
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-amd64
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_HASH=${{ steps.commit-hash.outputs.short }}

      - name: Add Docker Image Info to Summary
        if: steps.pr-info.outputs.pr_number != '0'
        env:
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.short }}
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
        run: |
          {
            echo "## 🐳 Docker Images Built"
            echo ""
            echo "Multi-architecture Docker images have been built with the latest changes from this PR!"
            echo ""
            echo "### Pull Command"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ${DOCKER_USER}/booklore:pr-${PR_NUMBER}"
            echo "\`\`\`"
            echo ""
            echo "📦 **Latest Commit:** \`${COMMIT_HASH}\`"
            echo ""
            echo "🏗️ **Platforms:** \`linux/arm64\`, \`linux/amd64\`"
            echo ""
            echo "These images are automatically updated on each push to the PR."
          } >> $GITHUB_STEP_SUMMARY


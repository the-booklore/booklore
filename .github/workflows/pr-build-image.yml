name: PR Build Docker Image

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to build (leave empty for current branch)'
        required: false

concurrency:
  group: pr-build-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-image:
    name: Build Multi-Arch Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      commit_hash: ${{ steps.commit-hash.outputs.short }}
      pr_number: ${{ steps.pr-info.outputs.pr_number }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Get PR Info
        id: pr-info
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "ref=$PR_HEAD_REF" >> $GITHUB_OUTPUT
            echo "sha=$PR_HEAD_SHA" >> $GITHUB_OUTPUT
          elif [ -n "$INPUT_PR_NUMBER" ]; then
            echo "pr_number=$INPUT_PR_NUMBER" >> $GITHUB_OUTPUT
            echo "ref=$GITHUB_REF" >> $GITHUB_OUTPUT
            echo "sha=" >> $GITHUB_OUTPUT
          else
            echo "pr_number=0" >> $GITHUB_OUTPUT
            echo "ref=$GITHUB_REF" >> $GITHUB_OUTPUT
            echo "sha=" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.sha || github.ref }}

      - name: Get commit hash
        id: commit-hash
        run: |
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "short=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "full=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "Commit hash: $COMMIT_HASH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore
          tags: |
            type=raw,value=pr-${{ steps.pr-info.outputs.pr_number }}

      - name: Build and Push Docker Image
        timeout-minutes: 30
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-arm64
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-amd64
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_HASH=${{ steps.commit-hash.outputs.short }}

      - name: Comment on PR - Image Built
        if: steps.pr-info.outputs.pr_number != '0'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.short }}
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const commitHash = process.env.COMMIT_HASH;
            const dockerUser = process.env.DOCKER_USER;
            
            // Delete previous build comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            const buildComments = comments.filter(comment => 
              comment.body.includes('🐳 **Docker Image Built**') &&
              comment.user.type === 'Bot'
            );

            for (const comment of buildComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id
              });
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🐳 **Docker Images Built**\n\n` +
                    `Multi-architecture Docker images have been built with the latest changes from this PR!\n\n` +
                    `### Pull Command\n` +
                    `\`\`\`bash\n` +
                    `docker pull ${dockerUser}/booklore:pr-${prNumber}\n` +
                    `\`\`\`\n\n` +
                    `📦 **Latest Commit:** \`${commitHash}\`\n` +
                    `🏗️ **Platforms:** \`linux/arm64\`, \`linux/amd64\`\n\n` +
                    `These images are automatically updated on each push to the PR.`
            });


name: PR Build Docker Image

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to build (leave empty for current branch)'
        required: false

concurrency:
  group: pr-build-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-image:
    name: Build ARM64 Docker Image
    runs-on: ubuntu-24.04-arm
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      commit_hash: ${{ steps.commit-hash.outputs.short }}
      pr_number: ${{ steps.pr-info.outputs.pr_number }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Get PR Info
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.pr_number }}" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=0" >> $GITHUB_OUTPUT
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit hash
        id: commit-hash
        run: |
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "short=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "full=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "Commit hash: $COMMIT_HASH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Check if image already exists
        id: check-image
        env:
          IMAGE_TAG: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ steps.pr-info.outputs.pr_number }}-${{ steps.commit-hash.outputs.short }}
        run: |
          if docker manifest inspect "$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✓ Image already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image needs to be built"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore
          tags: |
            type=raw,value=pr-${{ steps.pr-info.outputs.pr_number }}-${{ steps.commit-hash.outputs.short }}
            type=raw,value=pr-${{ steps.pr-info.outputs.pr_number }}

      - name: Build and Push Docker Image
        if: steps.check-image.outputs.exists == 'false'
        timeout-minutes: 15
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-arm64
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_HASH=${{ steps.commit-hash.outputs.short }}

      - name: Comment on PR - Image Built
        if: steps.check-image.outputs.exists == 'false' && steps.pr-info.outputs.pr_number != '0'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.short }}
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const commitHash = process.env.COMMIT_HASH;
            const dockerUser = process.env.DOCKER_USER;
            
            // Delete previous build comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            const buildComments = comments.filter(comment => 
              comment.body.includes('🐳 **Docker Image Built**') &&
              comment.user.type === 'Bot'
            );

            for (const comment of buildComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id
              });
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🐳 **Docker Image Built**\n\n` +
                    `A new ARM64 Docker image is ready for this PR!\n\n` +
                    `### Pull Commands\n` +
                    `\`\`\`bash\n` +
                    `# Latest for this PR\n` +
                    `docker pull ${dockerUser}/booklore:pr-${prNumber}\n\n` +
                    `# Specific commit\n` +
                    `docker pull ${dockerUser}/booklore:pr-${prNumber}-${commitHash}\n` +
                    `\`\`\`\n\n` +
                    `📦 **Commit:** \`${commitHash}\`\n` +
                    `🏗️ **Platform:** \`linux/arm64\`\n\n` +
                    `---\n` +
                    `💡 **To deploy this image**, comment \`/deploy\` on this PR.`
            });

      - name: Comment on PR - Using Cached Image
        if: steps.check-image.outputs.exists == 'true' && steps.pr-info.outputs.pr_number != '0'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.short }}
        with:
          script: |
            console.log(`Image already exists for PR #${process.env.PR_NUMBER} commit ${process.env.COMMIT_HASH}, skipping comment.`);

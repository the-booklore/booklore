          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Why This Matters" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "E-Ink displays have unique characteristics:" >> $GITHUB_STEP_SUMMARY
          echo "- **16 grayscale levels** vs millions of colors on LCD" >> $GITHUB_STEP_SUMMARY
          echo "- **Slow refresh** requires larger touch targets" >> $GITHUB_STEP_SUMMARY
          echo "- **No backlight** means contrast is critical" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Common E-Ink UI failures:" >> $GITHUB_STEP_SUMMARY
          echo "- Buttons invisible due to subtle color differences" >> $GITHUB_STEP_SUMMARY
          echo "- Dark mode rendering as black-on-black" >> $GITHUB_STEP_SUMMARY
          echo "- Focus indicators disappearing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Visual Regression | ${{ needs.eink-visual-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contrast Analysis | ${{ needs.eink-contrast-analysis.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Devices Tested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Kobo Libra 2 (7\" 300 PPI)" >> $GITHUB_STEP_SUMMARY
          echo "- Kobo Elipsa (10.3\")" >> $GITHUB_STEP_SUMMARY
          echo "- PocketBook Era" >> $GITHUB_STEP_SUMMARY
          echo "- Kindle Paperwhite 5" >> $GITHUB_STEP_SUMMARY

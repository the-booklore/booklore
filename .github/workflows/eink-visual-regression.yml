name: E-Ink Visual Regression Tests

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'booklore-ui/src/**/*.scss'
      - 'booklore-ui/src/**/*.css'
      - 'booklore-ui/src/**/*.html'
      - 'booklore-ui/src/**/*.component.ts'
      - 'testing/playwright/**'
      - '.github/workflows/eink-visual-regression.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # Build and Prepare
  # ============================================
  build-for-eink-tests:
    name: Build for E-Ink Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build BookLore image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:eink-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # E-Ink Visual Regression Tests
  # TEMPORARILY DISABLED - These tests are being revised
  # ============================================
  # eink-visual-tests:
  #   name: E-Ink Visual Tests
  #   runs-on: ubuntu-latest
  #   needs: build-for-eink-tests
  #   timeout-minutes: 30

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: testing/playwright/package-lock.json

      - name: Install Playwright dependencies
        working-directory: testing/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild image (cache hit expected)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:eink-test
          cache-from: type=gha

      - name: Start BookLore
        run: |
          docker network create eink-test-net
          
          # Start MariaDB
          docker run -d \
            --name mariadb-eink \
            --network eink-test-net \
            -e MYSQL_ROOT_PASSWORD=einktest \
            -e MYSQL_DATABASE=booklore \
            mariadb:10.11
          
          # Wait for MariaDB
          for i in {1..30}; do
            if docker exec mariadb-eink mariadb-admin ping -h localhost -uroot -peinktest 2>/dev/null; then
              echo "✅ MariaDB ready"
              break
            fi
            sleep 2
          done
          
          # Start BookLore
          docker run -d \
            --name booklore-eink \
            --network eink-test-net \
            -p 6060:8080 \
            -e DATABASE_URL=jdbc:mariadb://mariadb-eink:3306/booklore \
            -e DATABASE_USERNAME=root \
            -e DATABASE_PASSWORD=einktest \
            booklore:eink-test
          
          # Wait for BookLore
          echo "⏳ Waiting for BookLore..."
          for i in {1..60}; do
            HTTP_CODE=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
              http://localhost:6060/actuator/health 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ BookLore ready"
              break
            fi
            echo "Attempt $i/60 - HTTP: $HTTP_CODE"
            sleep 3
          done

      - name: Run E-Ink visual regression tests
        working-directory: testing/playwright
        env:
          BASE_URL: http://localhost:6060
          CI: true
        run: |
          # Run tests, capturing output to check for missing snapshots
          set +e
          npx playwright test eink-visual-regression.spec.ts \
            --project=eink-visual-regression \
            --reporter=html,json > playwright.log 2>&1
          EXIT_CODE=$?
          set -e
          
          cat playwright.log
          
          if [ $EXIT_CODE -ne 0 ]; then
            if grep -q "snapshot doesn't exist" playwright.log; then
              echo "📸 Snapshots missing. Generating them now..."
              npx playwright test eink-visual-regression.spec.ts \
                --project=eink-visual-regression \
                --reporter=html,json \
                --update-snapshots
              echo "⚠️ Snapshots generated. Please download the 'eink-screenshots' artifact and commit the new snapshots to the repository."
            else
              exit $EXIT_CODE
            fi
          fi

      - name: Run accessibility tests with E-Ink focus
        working-directory: testing/playwright
        env:
          BASE_URL: http://localhost:6060
          CI: true
        run: |
          npx playwright test accessibility.spec.ts \
            --project=kobo-libra-2 \
            --reporter=html,json || true
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eink-playwright-report
          path: |
            testing/playwright/playwright-report/
            testing/playwright/test-results/
            testing/playwright/test-results.json
          retention-days: 14

      - name: Upload E-Ink screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eink-screenshots
          path: |
            testing/playwright/test-results/**/*.png
            testing/playwright/**/*.spec.ts-snapshots/**/*.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          docker rm -f booklore-eink mariadb-eink 2>/dev/null || true
          docker network rm eink-test-net 2>/dev/null || true

  # ============================================
  # E-Ink Contrast Analysis
  # TEMPORARILY DISABLED - These tests are being revised
  # ============================================
  # eink-contrast-analysis:
  #   name: E-Ink Contrast Analysis
  #   runs-on: ubuntu-latest
  #   needs: build-for-eink-tests
  #   timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install analysis tools
        run: |
          npm install -g lighthouse
          npm install puppeteer

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:eink-test
          cache-from: type=gha

      - name: Start services
        run: |
          docker network create contrast-test-net
          
          docker run -d \
            --name mariadb-contrast \
            --network contrast-test-net \
            -e MYSQL_ROOT_PASSWORD=contrasttest \
            -e MYSQL_DATABASE=booklore \
            mariadb:10.11
          
          sleep 15
          
          docker run -d \
            --name booklore-contrast \
            --network contrast-test-net \
            -p 6060:8080 \
            -e DATABASE_URL=jdbc:mariadb://mariadb-contrast:3306/booklore \
            -e DATABASE_USERNAME=root \
            -e DATABASE_PASSWORD=contrasttest \
            booklore:eink-test
          
          # Wait for startup
          for i in {1..60}; do
            if curl -s http://localhost:6060/actuator/health | grep -q "UP"; then
              echo "✅ Backend Ready"
              break
            fi
            sleep 3
          done

          # Wait for frontend to be served
          echo "⏳ Waiting for frontend..."
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6060/)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend Ready"
              break
            fi
            sleep 2
          done

          # Final check
          if ! curl -s http://localhost:6060/actuator/health | grep -q "UP"; then
            echo "❌ Server failed to start"
            docker logs booklore-contrast
            exit 1
          fi

      - name: Run Lighthouse accessibility audit
        run: |
          echo "🔍 Running Lighthouse accessibility audit..."
          
          # Verify frontend is accessible before running Lighthouse
          echo "Checking if frontend is ready..."
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6060/)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend is ready (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/10 - Frontend HTTP: $HTTP_CODE"
            sleep 3
          done
          
          # Verify one more time
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6060/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Frontend not responding (HTTP $HTTP_CODE), skipping Lighthouse"
            docker logs booklore-contrast 2>&1 | tail -50
            exit 0  # Don't fail the job, just skip Lighthouse
          fi
          
          # Run Lighthouse
          lighthouse http://localhost:6060 \
            --only-categories=accessibility \
            --output=json,html \
            --output-path=/tmp/lighthouse-report \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --preset=desktop || {
              echo "⚠️ Lighthouse failed, checking logs..."
              docker logs booklore-contrast 2>&1 | tail -100
              exit 0  # Don't fail the job
            }
          
          # Extract accessibility score (only if report exists)
          if [ -f /tmp/lighthouse-report.report.json ]; then
            SCORE=$(jq -r '.categories.accessibility.score // 0' /tmp/lighthouse-report.report.json)
            SCORE_PCT=$(echo "$SCORE * 100" | bc -l 2>/dev/null || echo "0")
            echo "📊 Accessibility Score: ${SCORE_PCT}%"
            
            # Check for color contrast issues
            CONTRAST_ISSUES=$(jq '[.audits["color-contrast"].details.items // [] | length] | add // 0' /tmp/lighthouse-report.report.json)
            echo "🎨 Color Contrast Issues: $CONTRAST_ISSUES"
            
            if [ "$CONTRAST_ISSUES" -gt 0 ]; then
              echo ""
              echo "⚠️ Color contrast issues that may affect E-Ink readability:"
              jq -r '.audits["color-contrast"].details.items[]? | "  - \(.node.snippet // \"unknown element\")"' /tmp/lighthouse-report.report.json | head -10 || true
            fi
          else
            echo "⚠️ Lighthouse report not generated, skipping analysis"
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-accessibility-report
          path: /tmp/lighthouse-report*
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          docker rm -f booklore-contrast mariadb-contrast 2>/dev/null || true
          docker network rm contrast-test-net 2>/dev/null || true

  # ============================================
  # Summary
  # TEMPORARILY DISABLED - Tests are being revised

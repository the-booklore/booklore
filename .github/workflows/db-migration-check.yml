name: Database Migration Check

on:
  pull_request:
    paths:
      - 'booklore-api/src/main/resources/db/migration/**'
      - 'scripts/check-migration-integrity.sh'
      - '.github/workflows/db-migration-check.yml'

jobs:
  migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: booklore
          MARIADB_EXTRA_FLAGS: --max-allowed-packet=64M --innodb-buffer-pool-size=128M
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Wait for MariaDB
        run: |
          sleep 10
          for i in {1..30}; do
            if mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent 2>/dev/null; then
              echo "✅ MariaDB is ready"
              exit 0
            fi
            echo "⏳ Waiting for MariaDB... ($i/30)"
            sleep 2
          done
          echo "❌ MariaDB failed to start"
          exit 1

      - name: Check Migration Integrity
        id: integrity
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x scripts/check-migration-integrity.sh
          ./scripts/check-migration-integrity.sh "origin/$BASE_REF"

      - name: SQL syntax check
        id: sql_lint
        run: |
          echo "Checking SQL files for basic syntax issues..."
          
          issues_found=0
          
          # Check for missing semicolons (very basic check)
          for file in $(find booklore-api/src/main/resources/db/migration -name "*.sql"); do
            if [ ! -s "$file" ]; then
              continue
            fi
            
            # Check if file ends with semicolon (basic check)
            if ! tail -1 "$file" | grep -q ";[[:space:]]*$"; then
              echo "⚠️  $file: May be missing semicolon at end"
              issues_found=$((issues_found + 1))
            fi
          done
          
          if [ $issues_found -eq 0 ]; then
            echo "✅ No basic SQL syntax issues found"
          else
            echo "⚠️  Found $issues_found potential SQL syntax issues"
          fi

      - name: Run Flyway Migrations
        id: flyway
        working-directory: booklore-api
        env:
          FLYWAY_URL: jdbc:mariadb://127.0.0.1:3306/booklore
          FLYWAY_USER: root
          FLYWAY_PASSWORD: root
          FLYWAY_CLEAN_DISABLED: 'false'
        run: |
          ./gradlew flywayClean flywayMigrate flywayValidate --info \
            -Dorg.gradle.jvmargs="-Xmx1024m"

      - name: Migration Summary
        if: always()
        run: |
          echo "## Migration Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integrity | ${{ steps.integrity.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL lint | ${{ steps.sql_lint.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flyway | ${{ steps.flyway.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

# CodeQL Analysis Workflow
#
# Purpose: Performs comprehensive static analysis to identify security vulnerabilities and code issues
# Significance: Automated security scanning that helps identify potential vulnerabilities early
# Key Functions:
# - Analyzes Java codebase for security vulnerabilities and bugs
# - Analyzes JavaScript/TypeScript frontend for common security issues
# - Runs sophisticated data-flow analysis to identify potential security risks
# - Uploads results to GitHub Security tab for centralized vulnerability tracking
# - Scheduled weekly to catch newly discovered patterns in the code
name: CodeQL Analysis

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly on Monday at 4 AM

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze-java:
    name: Analyze Java
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: Make gradlew executable
        working-directory: ./booklore-api
        run: chmod +x ./gradlew

      - name: Build Java
        working-directory: ./booklore-api
        run: ./gradlew build -x test --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  analyze-javascript:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

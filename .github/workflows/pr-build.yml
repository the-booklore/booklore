name: PR Preview - Build Multi-Arch Image

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-pr-multiarch:
    name: Build Multi-Arch Image (ARM64 + AMD64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Multi-Arch)
        timeout-minutes: 60
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          platforms: linux/arm64,linux/amd64
          tags: |
            booklore:pr-${{ github.event.number }}-arm64
            booklore:pr-${{ github.event.number }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment Build Success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🐳 **Multi-Arch Docker Image Built Successfully!**\n\n` +
                    `Platforms:\n` +
                    `- \`linux/arm64\`\n` +
                    `- \`linux/amd64\`\n\n` +
                    `PR Number: \`${{ github.event.number }}\`\n\n` +
                    `✅ Image built and cached (not yet published to Docker Hub)\n\n` +
                    `**To publish this image to Docker Hub**, an authorized user can comment:\n` +
                    `\`\`\`\n/publish-pr\n\`\`\`\n\n` +
                    `Authorized publishers: @balazs-szucs, @adityachandel`
            });

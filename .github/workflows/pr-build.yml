name: PR Preview - Build Multi-Arch Image

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pr-multiarch:
    name: Build Multi-Arch Image (ARM64 + AMD64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Multi-Arch)
        timeout-minutes: 60
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          platforms: linux/arm64,linux/amd64
          tags: |
            booklore:pr-${{ github.event.number }}-arm64
            booklore:pr-${{ github.event.number }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Status Comment Body
        run: |
          cat > /tmp/comment.md << 'EOF'
          ## 🔄 PR Preview Status Dashboard
          
          **PR #${{ github.event.number }}** | **Branch:** `${{ github.head_ref }}` → `${{ github.base_ref }}`
          
          ### ✅ Build Status
          - Multi-Arch Docker Build: **IN PROGRESS**
            - `linux/arm64` ⏳
            - `linux/amd64` ⏳
          
          ### 📊 Quality Checks Status
          
          | Check | Status | Notes |
          |-------|--------|-------|
          | Build & Tests | 🔄 Queued | Frontend, Backend, Docker |
          | Security Scan | 🔄 Queued | Dependencies, Secrets, SAST |
          | Code Quality | 🔄 Queued | ESLint, Checkstyle |
          | Type Checking | 🔄 Queued | TypeScript, Java |
          | DB Migrations | 🔄 Queued | Flyway validation |
          | PR Validation | 🔄 Queued | Description, Commits |
          | API Tests | 🔄 Queued | Swagger endpoints |
          
          ### 🚀 Next Steps
          
          After build completes, authorized users can:
          
          **Publish to Docker Hub:**
          ```
          /publish-pr
          ```
          
          **Deploy Preview:**
          ```
          /deploy-pr
          ```
          
          Authorized: balazs-szucs, adityachandel
          
          ---
          
          *Status auto-updates as checks complete*
          EOF
          cat /tmp/comment.md

      - name: Find or Create Status Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('/tmp/comment.md', 'utf8');
            const prNumber = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('PR Preview Status Dashboard')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('Updated status comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
              console.log('Created new status comment');
            }

      - name: Add Eyes Reaction
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                content: 'eyes'
              });
            } catch (e) {
              console.log('Reaction exists');
            }

name: PR Preview - Build Image

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-pr-image:
    name: Build ARM64 Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push PR Image
        timeout-minutes: 45
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ github.event.number }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache,mode=max

      - name: Comment Build Success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🐳 **Docker Image Built Successfully!**\n\n` +
                    `Image: \`${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ github.event.number }}\`\n\n` +
                    `To deploy this preview, an authorized user can comment:\n` +
                    `\`\`\`\n/deploy-pr\n\`\`\``
            });

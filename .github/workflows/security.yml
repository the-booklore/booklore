name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  gitleaks-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep-scan:
    name: SAST Scanning (Semgrep)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          # Install semgrep if not available
          pip install semgrep

          # Run semgrep with SARIF output
          semgrep --config auto --sarif --output semgrep.sarif . || true

          # Ensure SARIF file exists (create empty one if semgrep found nothing)
          if [ ! -f semgrep.sarif ]; then
            echo '{"version": "2.1.0", "runs": []}' > semgrep.sarif
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

# Security Scan Workflow
#
# Purpose: Performs automated security scanning of code and dependencies
# Significance: Proactively identifies security vulnerabilities before they reach production
# Key Functions:
# - Runs Semgrep SAST (Static Application Security Testing) analysis
# - Identifies potential security issues in source code
# - Uploads findings to GitHub Security tab as SARIF format for code scanning
# - Runs on every pull request to catch vulnerabilities early
# - Scheduled weekly to catch newly discovered vulnerabilities
name: Security Scan

on:
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  semgrep-scan:
    name: SAST Scanning (Semgrep)
    runs-on: ubuntu-latest
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          # Install semgrep if not available
          pip install semgrep

          # Run semgrep with SARIF output
          semgrep --config auto --sarif --output semgrep.sarif . || true

          # Ensure SARIF file exists (create empty one if semgrep found nothing)
          if [ ! -f semgrep.sarif ]; then
            echo '{"version": "2.1.0", "runs": []}' > semgrep.sarif
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

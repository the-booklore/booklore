name: PR Deployment via Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: |
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '/deploy-pr') ||
        contains(github.event.comment.body, '/prdeploy') ||
        contains(github.event.comment.body, '/deploypr')
      )
    outputs:
      pr_number: ${{ steps.get-pr.outputs.pr_number }}
      comment_id: ${{ github.event.comment.id }}
      head_ref: ${{ steps.get-pr-branch.outputs.head_ref }}
      head_sha: ${{ steps.get-pr-branch.outputs.head_sha }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Get PR Branch
        uses: xt0rted/pull-request-comment-branch@v2
        id: get-pr-branch

      - name: Get PR data
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            console.log(`PR Number: ${prNumber}`);
            core.setOutput('pr_number', prNumber);

      - name: Add 'in_progress' reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            console.log(`Adding eyes reaction to comment ID: ${context.payload.comment.id}`);
            try {
              const { data: reaction } = await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes'
              });
              console.log(`Added reaction with ID: ${reaction.id}`);
            } catch (error) {
              console.error(`Failed to add reaction: ${error.message}`);
            }

  deploy-pr:
    needs: check-comment
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    concurrency:
      group: deploy-pr-${{ needs.check-comment.outputs.pr_number }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-comment.outputs.head_ref }}

      - name: Get commit hash for cache key
        id: commit-hash
        run: |
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "short=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "Commit hash: $COMMIT_HASH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Check if image exists
        id: check-image
        env:
          IMAGE_TAG: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ needs.check-comment.outputs.pr_number }}-${{ steps.commit-hash.outputs.short }}
        run: |
          if docker manifest inspect "$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image needs to be built"
          fi

      # Required for Cross-Platform Builds (AMD64 -> ARM64)
      - name: Set up QEMU
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Build and Push PR Image
        if: steps.check-image.outputs.exists == 'false'
        timeout-minutes: 60
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./testing/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ needs.check-comment.outputs.pr_number }}-${{ steps.commit-hash.outputs.short }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ needs.check-comment.outputs.pr_number }}-latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache,mode=max

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to VPS
        id: deploy
        env:
          PR_NUM: ${{ needs.check-comment.outputs.pr_number }}
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
          COMMIT_SHORT: ${{ steps.commit-hash.outputs.short }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          APP_PORT=$((6000 + PR_NUM))
          DB_PORT=$((7000 + PR_NUM))
          UNIQUE_NAME="docker-compose-pr-${PR_NUM}-${GITHUB_RUN_ID}.yml"
          
          cat > "$UNIQUE_NAME" << EOF
          services:
            booklore:
              image: ${DOCKER_USER}/booklore:pr-${PR_NUM}-${COMMIT_SHORT}
              container_name: booklore-pr-${PR_NUM}
              environment:
                - TZ=Etc/UTC
                - SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/booklore?useSSL=false&allowPublicKeyRetrieval=true
                - SPRING_DATASOURCE_USERNAME=booklore
                - SPRING_DATASOURCE_PASSWORD=pr_pass_${PR_NUM}
                - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver
                - SPRING_JPA_HIBERNATE_DDL_AUTO=update
              depends_on:
                mariadb:
                  condition: service_healthy
              ports:
                - "${APP_PORT}:6060"
              volumes:
                - ./data:/app/data
                - ./books:/books
                - ./bookdrop:/bookdrop
              restart: on-failure:5
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:6060/actuator/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 90s

            mariadb:
              image: lscr.io/linuxserver/mariadb:11.4.5
              container_name: mariadb-pr-${PR_NUM}
              environment:
                - PUID=1000
                - PGID=1000
                - TZ=Etc/UTC
                - MYSQL_ROOT_PASSWORD=pr_root_${PR_NUM}
                - MYSQL_DATABASE=booklore
                - MYSQL_USER=booklore
                - MYSQL_PASSWORD=pr_pass_${PR_NUM}
              volumes:
                - ./mariadb_data:/config
              healthcheck:
                test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
                interval: 5s
                timeout: 5s
                retries: 10
          EOF
          
          # Copy to remote with unique name to avoid race conditions
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$UNIQUE_NAME" "${VPS_USER}@${VPS_HOST}:/tmp/${UNIQUE_NAME}"
          
          # SSH and deploy atomically
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" << ENDSSH
            # Create PR-specific directories
            mkdir -p ~/deployments/pr-${PR_NUM}/{data,books,bookdrop,mariadb_data}
            
            # Move docker-compose file to correct location
            mv /tmp/${UNIQUE_NAME} ~/deployments/pr-${PR_NUM}/docker-compose.yml
            
            # Start or restart the container
            cd ~/deployments/pr-${PR_NUM}
            docker compose down || true
            docker compose pull
            docker compose up -d
            
            # Cleanup old images but keep recent ones
            docker image prune -af --filter "until=168h" || true
          ENDSSH
          
          echo "app_port=${APP_PORT}" >> $GITHUB_OUTPUT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Add success reaction to comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            console.log(`Adding rocket reaction to comment ID: ${{ needs.check-comment.outputs.comment_id }}`);
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: ${{ needs.check-comment.outputs.comment_id }},
                content: 'rocket'
              });
              console.log(`Added rocket reaction`);
            } catch (error) {
              console.error(`Failed to add reaction: ${error.message}`);
            }

            // Add label to PR
            const prNumber = ${{ needs.check-comment.outputs.pr_number }};
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['pr-deployed']
              });
              console.log(`Added 'pr-deployed' label to PR #${prNumber}`);
            } catch (error) {
              console.error(`Failed to add label to PR: ${error.message}`);
            }

      - name: Add failure reaction to comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log(`Adding -1 reaction to comment ID: ${{ needs.check-comment.outputs.comment_id }}`);
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: ${{ needs.check-comment.outputs.comment_id }},
                content: '-1'
              });
              console.log(`Added -1 reaction`);
            } catch (error) {
              console.error(`Failed to add reaction: ${error.message}`);
            }

      - name: Post deployment URL to PR
        if: success()
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ needs.check-comment.outputs.pr_number }}
          COMMIT_SHORT: ${{ steps.commit-hash.outputs.short }}
          IMAGE_EXISTS: ${{ steps.check-image.outputs.exists }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        with:
          script: |
            const prNum = parseInt(process.env.PR_NUM);
            const port = 6000 + prNum;
            const host = process.env.VPS_HOST;
            const commit = process.env.COMMIT_SHORT;
            const cached = process.env.IMAGE_EXISTS === 'true';
            
            const buildNote = cached ? '📦 *Used cached image*' : '🔨 *Built new image*';
            
            const commentBody = `## 🚀 PR Preview Deployed!\n\n` +
              `| Resource | Value |\n` +
              `|----------|-------|\n` +
              `| 📚 **URL** | http://${host}:${port} |\n` +
              `| 🏷️ **Commit** | \`${commit}\` |\n` +
              `| 🐳 **Port** | ${port} |\n\n` +
              `${buildNote}\n\n` +
              `⚠️ *Firewall port ${port} must be open. Data is ephemeral and will be cleaned up when the PR is closed.*`;
            
            await github.rest.issues.createComment({
              issue_number: prNum,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ needs.check-comment.outputs.pr_number }}
        with:
          script: |
            const prNum = parseInt(process.env.PR_NUM);
            
            await github.rest.issues.createComment({
              issue_number: prNum,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Deployment Failed!**\n\nCheck the [workflow logs](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`
            });

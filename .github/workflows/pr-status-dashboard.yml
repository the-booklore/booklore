name: PR Status Dashboard

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  workflow_run:
    workflows: 
      - "Build and Test"
      - "Database Migration Validation"
      - "PR Preview - Build Multi-Arch Image"
    types: [completed]

concurrency:
  group: pr-status-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: read

jobs:
  update-status:
    name: Update PR Status Dashboard
    runs-on: ubuntu-latest
    if: github.event.pull_request || (github.event.workflow_run && github.event.workflow_run.pull_requests[0])

    steps:
      - name: Get PR Number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          WR_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_BASE_REF: ${{ github.event.workflow_run.pull_requests[0].base.ref }}
        run: |
          if [ "$EVENT_NAME" == "pull_request" ]; then
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT
            echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT
          else
            echo "number=$WR_PR_NUMBER" >> $GITHUB_OUTPUT
            echo "head_ref=$WR_HEAD_BRANCH" >> $GITHUB_OUTPUT
            echo "base_ref=$WR_BASE_REF" >> $GITHUB_OUTPUT
          fi

      - name: Get Check Status and Update Comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const headRef = process.env.HEAD_REF;
            const baseRef = process.env.BASE_REF;
            
            // Get the PR details to find the head SHA
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const headSha = pr.head.sha;
            
            // Get workflow runs for this PR
            const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: headSha,
              per_page: 50
            });
            
            // Map workflow names to display names
            const workflowMapping = {
              'Build and Test': { key: 'build', name: '🏗️ Build & Tests' },
              'Database Migration Validation': { key: 'migrations', name: '🗄️ DB Migrations' },
              'Swagger API Tests': { key: 'api_tests', name: '🧪 API Tests' },
              'PR Preview - Build Multi-Arch Image': { key: 'docker', name: '🐳 Docker Build' }
            };
            
            // Create status map
            const statusMap = {};
            
            // Process workflow runs
            for (const run of workflowRuns.workflow_runs) {
              const mapping = workflowMapping[run.name];
              if (mapping) {
                let status = '🔄';
                let statusText = 'Running';
                
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    status = '✅';
                    statusText = 'Passed';
                  } else if (run.conclusion === 'failure') {
                    status = '❌';
                    statusText = 'Failed';
                  } else if (run.conclusion === 'cancelled') {
                    status = '⏹️';
                    statusText = 'Cancelled';
                  } else if (run.conclusion === 'skipped') {
                    status = '⏭️';
                    statusText = 'Skipped';
                  } else {
                    status = '⚠️';
                    statusText = run.conclusion || 'Unknown';
                  }
                } else if (run.status === 'queued') {
                  status = '⏳';
                  statusText = 'Queued';
                }
                
                // Calculate duration
                let duration = '-';
                if (run.status === 'completed') {
                  const seconds = Math.round((new Date(run.updated_at) - new Date(run.created_at)) / 1000);
                  if (seconds < 60) {
                    duration = seconds + 's';
                  } else {
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    duration = mins + 'm ' + secs + 's';
                  }
                }
                
                // Only update if we don't have a status yet or this run is newer
                if (!statusMap[mapping.key] || new Date(run.updated_at) > new Date(statusMap[mapping.key].updated_at)) {
                  statusMap[mapping.key] = {
                    name: mapping.name,
                    status,
                    statusText,
                    url: run.html_url,
                    duration,
                    updated_at: run.updated_at
                  };
                }
              }
            }
            
            // Set defaults for missing checks
            const defaultChecks = [
              { key: 'build', name: '🏗️ Build & Tests' },
              { key: 'migrations', name: '🗄️ DB Migrations' },
              { key: 'api_tests', name: '🧪 API Tests' },
              { key: 'docker', name: '🐳 Docker Build' }
            ];
            
            for (const check of defaultChecks) {
              if (!statusMap[check.key]) {
                statusMap[check.key] = {
                  name: check.name,
                  status: '⏳',
                  statusText: 'Pending',
                  url: null,
                  duration: '-'
                };
              }
            }
            
            // Count passed/failed/pending
            const allChecks = Object.values(statusMap);
            const passed = allChecks.filter(c => c.statusText === 'Passed').length;
            const failed = allChecks.filter(c => c.statusText === 'Failed').length;
            const running = allChecks.filter(c => ['Running', 'Queued', 'Pending'].includes(c.statusText)).length;
            
            let overallStatus = '🔄 Checks Running';
            if (failed > 0) {
              overallStatus = '❌ ' + failed + ' Check' + (failed > 1 ? 's' : '') + ' Failed';
            } else if (running === 0 && passed === allChecks.length) {
              overallStatus = '✅ All Checks Passed';
            }
            
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            
            // Build the table rows with Result column
            let tableRows = '';
            for (const check of defaultChecks) {
              const c = statusMap[check.key];
              const statusLink = c.url ? '[' + c.status + '](' + c.url + ')' : c.status;
              let result = '-';
              if (c.statusText === 'Passed') result = '✅ SUCCESS';
              else if (c.statusText === 'Failed') result = '❌ FAIL';
              else if (c.statusText === 'Cancelled') result = '⏹️ CANCELLED';
              else if (c.statusText === 'Skipped') result = '⏭️ SKIPPED';
              tableRows += '| ' + c.name + ' | ' + statusLink + ' ' + c.statusText + ' | ' + result + ' | ' + c.duration + ' |\n';
            }
            
            // Build comment body
            const commentBody = '## 🔄 PR Status Dashboard\n\n' +
              '**PR #' + prNumber + '** | `' + headRef + '` → `' + baseRef + '` | ' + overallStatus + '\n\n' +
              '### 📊 Quality Checks\n\n' +
              '| Check | Status | Result | Duration |\n' +
              '|-------|--------|--------|----------|\n' +
              tableRows + '\n' +
              '### 🚀 Auto-Deployment Status\n\n' +
              'PRs from **balazs-szucs** are automatically deployed to a preview environment on every push.\n' +
              'Check for a deployment comment with the preview URL below.\n\n' +
              '---\n' +
              '📅 **Last Updated:** ' + timestamp + ' UTC\n' +
              '*This comment auto-updates as checks complete*';
            
            // Find existing status comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('PR Status Dashboard')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('Updated status dashboard comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
              console.log('Created new status dashboard comment');
            }

name: Code Quality Metrics

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ============================================
  # Frontend Bundle Analysis
  # ============================================
  frontend-bundle-size:
    name: Frontend Bundle Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-ui

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build production bundle
        run: npm run build -- --configuration=production --stats-json
        continue-on-error: true

      - name: Analyze bundle size
        id: bundle
        run: |
          if [ -d "dist/booklore/browser" ]; then
            TOTAL_SIZE=$(du -sb dist/booklore/browser | cut -f1)
            SIZE_KB=$((TOTAL_SIZE / 1024))
            SIZE_MB=$((SIZE_KB / 1024))
            echo "size_kb=$SIZE_KB" >> $GITHUB_OUTPUT
            echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
            echo "Bundle size: ${SIZE_KB}KB (${SIZE_MB}MB)"
            
            # List largest files
            echo "### Largest files:"
            find dist/booklore/browser -type f -name "*.js" -exec du -h {} \; | sort -rh | head -10
          else
            echo "Build directory not found"
            echo "size_kb=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload bundle stats
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-stats
          path: |
            booklore-ui/dist/booklore/browser/stats.json
          retention-days: 30
          if-no-files-found: ignore

      # Note: PR comment step removed to reduce PR noise
      # Bundle size metrics available in artifacts and workflow summary

  # ============================================
  # Backend Code Metrics
  # ============================================
  backend-metrics:
    name: Backend Code Metrics
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-api

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport --no-daemon
        continue-on-error: true

      - name: Generate dependency report
        run: ./gradlew dependencies --configuration runtimeClasspath > dependencies.txt
        continue-on-error: true

      - name: Count code metrics
        id: metrics
        run: |
          # Count Java files and lines
          JAVA_FILES=$(find src/main/java -name "*.java" | wc -l)
          JAVA_LINES=$(find src/main/java -name "*.java" -exec cat {} \; | wc -l)
          TEST_FILES=$(find src/test/java -name "*.java" 2>/dev/null | wc -l)
          TEST_LINES=$(find src/test/java -name "*.java" 2>/dev/null -exec cat {} \; | wc -l)
          
          echo "java_files=$JAVA_FILES" >> $GITHUB_OUTPUT
          echo "java_lines=$JAVA_LINES" >> $GITHUB_OUTPUT
          echo "test_files=$TEST_FILES" >> $GITHUB_OUTPUT
          echo "test_lines=$TEST_LINES" >> $GITHUB_OUTPUT
          
          echo "### Backend Metrics"
          echo "- Java files: $JAVA_FILES"
          echo "- Java lines: $JAVA_LINES"
          echo "- Test files: $TEST_FILES"
          echo "- Test lines: $TEST_LINES"

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-metrics
          path: |
            booklore-api/build/reports/jacoco/
            booklore-api/dependencies.txt
          retention-days: 30
          if-no-files-found: ignore

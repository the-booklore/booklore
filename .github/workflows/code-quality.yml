name: Code Quality & Linting

on:
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  frontend-lint:
    name: Frontend Linting (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-ui

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  backend-quality:
    name: Backend Code Quality (Checkstyle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon
        continue-on-error: false

  formatting-check:
    name: Code Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Check Frontend Formatting
        working-directory: ./booklore-ui
        run: |
          npm ci --prefer-offline --no-audit
          npm run lint -- --fix --dry-run || true
        continue-on-error: true

      - name: Comment on PR if Issues Found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Code formatting issues detected!**\n\nRun `npm run lint -- --fix` to auto-fix formatting issues.'
            });

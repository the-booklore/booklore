name: Code Quality & Linting

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  frontend-lint:
    name: Frontend Linting (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-ui

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run ESLint
        id: eslint
        run: |
          npm run lint 2>&1 | tee /tmp/eslint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Count Lint Errors
        id: count
        if: always()
        run: |
          ERROR_COUNT=$(grep -c "error" /tmp/eslint-output.txt 2>/dev/null || echo "0")
          WARNING_COUNT=$(grep -c "warning" /tmp/eslint-output.txt 2>/dev/null || echo "0")
          echo "errors=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "warnings=$WARNING_COUNT" >> $GITHUB_OUTPUT
          echo "Found $ERROR_COUNT errors and $WARNING_COUNT warnings"

      - name: Exit with Error if Lint Failed
        if: steps.eslint.outcome == 'failure'
        run: exit 1

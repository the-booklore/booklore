name: Docker Persistence Smoke Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'start.sh'
      - 'booklore-api/src/main/resources/application.yaml'
      - '.github/workflows/docker-persistence-test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'start.sh'
      - 'booklore-api/src/main/resources/application.yaml'
      - '.github/workflows/docker-persistence-test.yml'
  workflow_dispatch:
  # Run weekly to catch container registry issues
  schedule:
    - cron: '0 4 * * 3'  # Wednesday 04:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================
  # Build Docker Image for Testing
  # ============================================
  build-test-image:
    name: Build Test Image
    runs-on: ubuntu-latest
    outputs:
      image_id: ${{ steps.build.outputs.imageid }}
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:persistence-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Test 1: Basic Persistence Across Restart
  # ============================================
  persistence-restart-test:
    name: Persistence - Restart Test
    runs-on: ubuntu-latest
    needs: build-test-image
    timeout-minutes: 25

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild test image (cache hit expected)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:persistence-test
          cache-from: type=gha

      - name: Create test network and volumes
        run: |
          docker network create booklore-persist-net || true
          docker volume create booklore-data-test || true
          docker volume create booklore-db-test || true

      - name: Start MariaDB with persistent volume
        run: |
          docker run -d \
            --name mariadb-persist \
            --network booklore-persist-net \
            -v booklore-db-test:/var/lib/mysql \
            -e MYSQL_ROOT_PASSWORD=persisttest \
            -e MYSQL_DATABASE=booklore \
            -e MYSQL_USER=booklore \
            -e MYSQL_PASSWORD=booklore \
            mariadb:10.11
          
          # Wait for MariaDB
          for i in {1..30}; do
            if docker exec mariadb-persist mariadb-admin ping -h localhost -uroot -ppersisttest 2>/dev/null; then
              echo "✅ MariaDB is ready"
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done

      - name: Start BookLore (Initial)
        run: |
          docker run -d \
            --name booklore-persist \
            --network booklore-persist-net \
            -p 6060:6060 \
            -v booklore-data-test:/data \
            -e DATABASE_URL=jdbc:mariadb://mariadb-persist:3306/booklore \
            -e DATABASE_USERNAME=booklore \
            -e DATABASE_PASSWORD=booklore \
            booklore:persistence-test
          
          # Wait for application to be ready
          echo "⏳ Waiting for BookLore to start..."
          for i in {1..60}; do
            HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" http://localhost:6060/actuator/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ BookLore is ready"
              break
            fi
            echo "Attempt $i/60 - HTTP: $HTTP_CODE"
            sleep 3
          done

      - name: Create canary data (pre-restart)
        id: canary
        run: |
          # Generate unique canary ID
          CANARY_ID="canary_$(date +%s)_$$"
          echo "canary_id=$CANARY_ID" >> $GITHUB_OUTPUT
          
          # Insert canary row directly into database
          docker exec mariadb-persist mariadb -uroot -ppersisttest booklore -e "
            CREATE TABLE IF NOT EXISTS _persistence_test_canary (
              id VARCHAR(255) PRIMARY KEY,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            INSERT INTO _persistence_test_canary (id) VALUES ('$CANARY_ID');
          "
          
          echo "🐤 Created canary: $CANARY_ID"
          
          # Also verify a BookLore table exists
          TABLES=$(docker exec mariadb-persist mariadb -uroot -ppersisttest booklore -sN -e "SHOW TABLES;" | wc -l)
          echo "📋 Tables in database: $TABLES"
          echo "table_count=$TABLES" >> $GITHUB_OUTPUT

      - name: Graceful restart (docker restart)
        run: |
          echo "🔄 Performing graceful restart..."
          docker restart booklore-persist
          
          # Wait for restart
          sleep 5

          for i in {1..60}; do
            HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" http://localhost:6060/actuator/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ BookLore restarted successfully"
              break
            fi
            echo "Waiting for restart... ($i/60) - HTTP: $HTTP_CODE"
            sleep 3
          done

      - name: Verify canary data (post-restart)
        run: |
          CANARY_ID="${{ steps.canary.outputs.canary_id }}"
          
          # Check if canary exists
          FOUND=$(docker exec mariadb-persist mariadb -uroot -ppersisttest booklore -sN -e "
            SELECT COUNT(*) FROM _persistence_test_canary WHERE id = '$CANARY_ID';
          " 2>/dev/null || echo "0")
          
          if [ "$FOUND" = "1" ]; then
            echo "✅ Canary data preserved after restart: $CANARY_ID"
          else
            echo "❌ CRITICAL: Canary data LOST after restart!"
            echo "   Expected: $CANARY_ID"
            echo "   Found count: $FOUND"
            
            # Debug: show what's in the table
            docker exec mariadb-persist mariadb -uroot -ppersisttest booklore -e "SELECT * FROM _persistence_test_canary;" || true
            exit 1
          fi
          
          # Verify table count didn't change
          EXPECTED_TABLES="${{ steps.canary.outputs.table_count }}"
          ACTUAL_TABLES=$(docker exec mariadb-persist mariadb -uroot -ppersisttest booklore -sN -e "SHOW TABLES;" | wc -l)
          
          if [ "$EXPECTED_TABLES" = "$ACTUAL_TABLES" ]; then
            echo "✅ Table count preserved: $ACTUAL_TABLES"
          else
            echo "⚠️ Table count changed: $EXPECTED_TABLES -> $ACTUAL_TABLES"
          fi

      - name: Force kill and restart test
        run: |
          echo "💀 Testing recovery from forced kill..."
          
          # Force kill (simulates crash)
          docker kill booklore-persist
          
          # Restart
          docker start booklore-persist
          
          # Wait for recovery
          for i in {1..60}; do
            HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" http://localhost:6060/actuator/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ BookLore recovered from forced kill"
              break
            fi
            echo "Waiting for recovery... ($i/60)"
            sleep 3
          done
          
          # Verify canary still exists
          CANARY_ID="${{ steps.canary.outputs.canary_id }}"
          FOUND=$(docker exec mariadb-persist mariadb -uroot -ppersisttest booklore -sN -e "
            SELECT COUNT(*) FROM _persistence_test_canary WHERE id = '$CANARY_ID';
          " 2>/dev/null || echo "0")
          
          if [ "$FOUND" = "1" ]; then
            echo "✅ Data preserved after forced kill"
          else
            echo "❌ Data LOST after forced kill!"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "name=booklore") 2>/dev/null || true
          docker rm -f $(docker ps -aq --filter "name=mariadb") 2>/dev/null || true
          docker network rm $(docker network ls -q --filter "name=booklore") 2>/dev/null || true
          docker volume rm $(docker volume ls -q --filter "name=booklore") 2>/dev/null || true

      - name: Persistence Test Summary
        if: always()
        run: |
          echo "## 💾 Persistence Restart Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Initial Start | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Canary Creation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Graceful Restart | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Force Kill Recovery | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Test 2: Container Replacement (docker-compose up -d)
  # ============================================
  persistence-replacement-test:
    name: Persistence - Container Replacement
    runs-on: ubuntu-latest
    needs: build-test-image
    timeout-minutes: 25

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:persistence-test
          cache-from: type=gha

      - name: Create persistent volumes
        run: |
          docker network create booklore-replace-net || true
          docker volume create booklore-replace-data || true
          docker volume create booklore-replace-db || true

      - name: Start initial stack
        run: |
          # Start MariaDB
          docker run -d \
            --name mariadb-replace \
            --network booklore-replace-net \
            -v booklore-replace-db:/var/lib/mysql \
            -e MYSQL_ROOT_PASSWORD=replacetest \
            -e MYSQL_DATABASE=booklore \
            mariadb:10.11
          
          sleep 10
          
          # Wait for MariaDB
          for i in {1..30}; do
            if docker exec mariadb-replace mariadb-admin ping -h localhost -uroot -preplacetest 2>/dev/null; then
              break
            fi
            sleep 2
          done
          
          # Start BookLore v1 (simulated)
          docker run -d \
            --name booklore-v1 \
            --network booklore-replace-net \
            -p 6061:6060 \
            -v booklore-replace-data:/data \
            -e DATABASE_URL=jdbc:mariadb://mariadb-replace:3306/booklore \
            -e DATABASE_USERNAME=root \
            -e DATABASE_PASSWORD=replacetest \
            booklore:persistence-test
          
          # Wait for ready
          for i in {1..60}; do
            if curl -s --max-time 10 http://localhost:6061/actuator/health | grep -q "UP"; then
              echo "✅ BookLore v1 ready"
              break
            fi
            sleep 3
          done

      - name: Create test data in v1
        id: v1data
        run: |
          CANARY="replace_test_$(date +%s)"
          echo "canary=$CANARY" >> $GITHUB_OUTPUT
          
          docker exec mariadb-replace mariadb -uroot -preplacetest booklore -e "
            CREATE TABLE IF NOT EXISTS _replacement_test (
              id VARCHAR(255) PRIMARY KEY,
              version VARCHAR(50),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            INSERT INTO _replacement_test (id, version) VALUES ('$CANARY', 'v1');
          "
          
          echo "📝 Created v1 data: $CANARY"

      - name: Replace container (simulate docker-compose pull && up -d)
        run: |
          echo "🔄 Simulating container replacement (upgrade scenario)..."
          
          # Stop and remove old container (but keep volume!)
          docker stop booklore-v1
          docker rm booklore-v1
          
          # Start new container with same volume
          docker run -d \
            --name booklore-v2 \
            --network booklore-replace-net \
            -p 6062:6060 \
            -v booklore-replace-data:/data \
            -e DATABASE_URL=jdbc:mariadb://mariadb-replace:3306/booklore \
            -e DATABASE_USERNAME=root \
            -e DATABASE_PASSWORD=replacetest \
            booklore:persistence-test
          
          # Wait for v2
          for i in {1..60}; do
            if curl -s --max-time 10 http://localhost:6062/actuator/health | grep -q "UP"; then
              echo "✅ BookLore v2 ready after replacement"
              break
            fi
            echo "Waiting for v2... ($i/60)"
            sleep 3
          done

      - name: Verify data survives replacement
        run: |
          CANARY="${{ steps.v1data.outputs.canary }}"
          
          FOUND=$(docker exec mariadb-replace mariadb -uroot -preplacetest booklore -sN -e "
            SELECT version FROM _replacement_test WHERE id = '$CANARY';
          " 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$FOUND" = "v1" ]; then
            echo "✅ Data from v1 preserved in v2: $CANARY"
            
            # Update to mark v2 access
            docker exec mariadb-replace mariadb -uroot -preplacetest booklore -e "
              UPDATE _replacement_test SET version = 'v2_verified' WHERE id = '$CANARY';
            "
          else
            echo "❌ Data LOST during container replacement!"
            echo "   Expected: v1"
            echo "   Found: $FOUND"
            docker logs booklore-v2 | tail -50
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "name=booklore") 2>/dev/null || true
          docker rm -f $(docker ps -aq --filter "name=mariadb") 2>/dev/null || true
          docker network rm $(docker network ls -q --filter "name=booklore") 2>/dev/null || true
          docker volume rm $(docker volume ls -q --filter "name=booklore") 2>/dev/null || true

  # ============================================
  # Test 3: Volume Mount Verification
  # ============================================
  volume-mount-test:
    name: Persistence - Volume Mounts
    runs-on: ubuntu-latest
    needs: build-test-image
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:persistence-test
          cache-from: type=gha

      - name: Test host directory mounts
        run: |
          mkdir -p /tmp/booklore-host-data
          mkdir -p /tmp/booklore-host-db
          
          # Start MariaDB with host mount
          docker run -d \
            --name mariadb-mount \
            -v /tmp/booklore-host-db:/var/lib/mysql \
            -e MYSQL_ROOT_PASSWORD=mounttest \
            -e MYSQL_DATABASE=booklore \
            mariadb:10.11
          
          sleep 15
          
          # Verify database files exist on host
          echo "📂 Checking database files on host..."
          ls -la /tmp/booklore-host-db/
          
          if [ -d "/tmp/booklore-host-db/booklore" ] || [ -f "/tmp/booklore-host-db/ibdata1" ]; then
            echo "✅ Database files created on host mount"
          else
            echo "⚠️ Database directory structure may differ"
            find /tmp/booklore-host-db -type f | head -10
          fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "name=mariadb") 2>/dev/null || true
          rm -rf /tmp/booklore-host-data /tmp/booklore-host-db 2>/dev/null || true

  # ============================================
  # Summary Job
  # ============================================
  persistence-summary:
    name: Persistence Tests Summary
    runs-on: ubuntu-latest
    needs: [persistence-restart-test, persistence-replacement-test, volume-mount-test]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# 💾 Docker Persistence Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "These tests verify that user data survives container lifecycle events." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Restart Persistence | ${{ needs.persistence-restart-test.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Replacement | ${{ needs.persistence-replacement-test.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Volume Mounts | ${{ needs.volume-mount-test.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Interpretation:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All tests passing means data persists correctly across upgrades" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failures indicate potential data loss during container lifecycle events" >> $GITHUB_STEP_SUMMARY


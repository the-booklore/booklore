name: PR Deploy on Comment

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to deploy"
        required: true
  pull_request:
    types: [closed]

concurrency:
  group: pr-deploy-${{ github.event.pull_request.number || github.event.inputs.pr }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  check-pr:
    if: github.event_name == 'issue_comment' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.comment-or-dispatch.outputs.should_deploy }}
      pr_number: ${{ steps.comment-or-dispatch.outputs.pr_number }}
      pr_repository: ${{ steps.comment-or-dispatch.outputs.repository }}
      pr_ref: ${{ steps.comment-or-dispatch.outputs.ref }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Debug Event Data
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Is PR Comment: ${{ github.event.issue.pull_request != null }}"
          echo "Comment Body: ${{ github.event.comment.body }}"
          echo "Comment Author: ${{ github.event.comment.user.login }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event Issue Number: ${{ github.event.issue.number }}"

      - name: Check comment or dispatch
        id: comment-or-dispatch
        uses: actions/github-script@v7
        env:
          INPUT_PR: ${{ github.event.inputs.pr }}
        with:
          script: |
            const isDispatch = context.eventName === 'workflow_dispatch';
            const authUsers = ['balazs-szucs'];
            let prNumber, author, shouldDeploy = false;

            if (isDispatch) {
              // Workflow dispatch
              prNumber = parseInt(process.env.INPUT_PR, 10);
              author = context.actor;
              console.log(`Dispatch by ${author} for PR #${prNumber}`);
            } else if (context.eventName === 'issue_comment') {
              // Comment trigger
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              
              // Check if it's a PR comment
              if (!issue.pull_request) {
                core.setFailed('Comment is not on a pull request');
                process.exit(1);
              }
              
              // Check for /deploy or /preview command (case-insensitive regex)
              const body = comment.body;
              const deployMatch = body.match(/\/(deploy|preview)/i);
              if (!deployMatch) {
                core.info(`Comment does not contain /deploy or /preview command. Body: ${body}`);
                core.setOutput('should_deploy', 'false');
                process.exit(0);
              }
              console.log(`✓ Found deploy command: /${deployMatch[1]}`);
              console.log(`Body was: ${body}`);
              console.log(`Match groups: ${deployMatch}`);
              // Continue with deployment
              if (!body.match(/\/(deploy|preview)/i)) {
                core.setFailed('Unexpected: regex matched but validation failed');
                process.exit(1);
              }
              
              prNumber = issue.number;
              author = comment.user.login;
              console.log(`Deploy command from ${author} on PR #${prNumber}`);
            }

            // Check authorization
            if (!authUsers.includes(author)) {
              core.setFailed(`User ${author} is not authorized to deploy`);
              process.exit(1);
            }

            // Fetch PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log(`PR #${prNumber} state: ${pr.state}`);
            console.log(`✓ Authorization passed for user: ${author}`);
            
            core.setOutput('should_deploy', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('repository', pr.head.repo.full_name);
            core.setOutput('ref', pr.head.ref);
            console.log(`✓ Outputs set: PR #${prNumber} ready for deployment`);

      - name: Post auth failure comment
        if: failure() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const actor = context.actor;
            
            if (issue && issue.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ @${actor} Your \`/deploy\` command failed. Only authorized users can deploy. Check [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`
              });
            }

  build-and-deploy:
    needs: check-pr
    runs-on: ubuntu-24.04-arm
    if: needs.check-pr.outputs.should_deploy == 'true'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Add deployment started comment
        id: deployment-started
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.check-pr.outputs.pr_number }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            
            // Delete previous deployment comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            const deployComments = comments.filter(comment => 
              comment.body.includes('🚀 **Auto-deploying BookLore**') ||
              comment.body.includes('## 🚀 BookLore Auto-Deployment Complete!') ||
              comment.body.includes('❌ **Auto-deployment failed**') ||
              comment.body.includes('🐳 Docker Image Published')
            );

            for (const comment of deployComments) {
              console.log(`Deleting old deployment comment: ${comment.id}`);
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id
              });
            }
            
            // Create new deployment started comment
            const { data: newComment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `🚀 **Auto-deploying BookLore** for PR #${prNumber}...\n\n_This is an automated deployment._\n\n⚠️ **Note:** If new commits are pushed during deployment, this build will be cancelled and replaced with the latest version.`
            });
            return newComment.id;

      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-pr.outputs.pr_ref }}
          repository: ${{ needs.check-pr.outputs.pr_repository }}
          fetch-depth: 0

      - name: Get commit hash
        id: commit-hash
        run: |
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "short=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "Commit hash: $COMMIT_HASH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Check if image exists
        id: check-image
        env:
          IMAGE_TAG: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ needs.check-pr.outputs.pr_number }}-${{ steps.commit-hash.outputs.short }}
        run: |
          if docker manifest inspect "$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image needs to be built"
          fi

      - name: Build and Push Docker Image (Native ARM64)
        if: steps.check-image.outputs.exists == 'false'
        timeout-minutes: 20
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ needs.check-pr.outputs.pr_number }}-${{ steps.commit-hash.outputs.short }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ needs.check-pr.outputs.pr_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/private.key << 'SSHKEY'
          ${{ secrets.VPS_SSH_KEY }}
          SSHKEY
          chmod 600 ~/.ssh/private.key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        id: deploy
        env:
          PR_NUMBER: ${{ needs.check-pr.outputs.pr_number }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.short }}
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Validate PR_NUMBER early
          echo "PR_NUMBER=${PR_NUMBER}"
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "undefined" ]; then
            echo "ERROR: PR_NUMBER is empty or undefined!"
            exit 1
          fi
          
          # Use correct VPS username
          VPS_USERNAME="ubuntu"
          
          # Calculate port based on PR number (e.g., PR #8 -> port 6008, PR #14 -> port 6014)
          APP_PORT=$((6000 + PR_NUMBER))
          DB_PORT=$((13300 + PR_NUMBER))
          
          # Create docker-compose for deployment
          cat > docker-compose.yml << EOF
          version: '3.8'
          services:
            mariadb:
              container_name: booklore-db-pr-${PR_NUMBER}
              image: mariadb:10.11
              environment:
                MYSQL_ROOT_PASSWORD: booklore_pr_${PR_NUMBER}
                MYSQL_DATABASE: booklore
                MYSQL_USER: booklore
                MYSQL_PASSWORD: booklore_pr_${PR_NUMBER}
              volumes:
                - booklore-db-pr-${PR_NUMBER}:/var/lib/mysql
              healthcheck:
                test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                interval: 5s
                timeout: 3s
                retries: 10
              restart: unless-stopped

            booklore:
              container_name: booklore-app-pr-${PR_NUMBER}
              image: ${DOCKER_USER}/booklore:pr-${PR_NUMBER}-${COMMIT_HASH}
              ports:
                - "${APP_PORT}:6060"
              environment:
                DATABASE_URL: jdbc:mariadb://mariadb:3306/booklore?createDatabaseIfNotExist=true
                DATABASE_USERNAME: booklore
                DATABASE_PASSWORD: booklore_pr_${PR_NUMBER}
                SWAGGER_ENABLED: "true"
              volumes:
                - booklore-data-pr-${PR_NUMBER}:/app/data
                - booklore-books-pr-${PR_NUMBER}:/books
              depends_on:
                mariadb:
                  condition: service_healthy
              restart: unless-stopped

          volumes:
            booklore-db-pr-${PR_NUMBER}:
            booklore-data-pr-${PR_NUMBER}:
            booklore-books-pr-${PR_NUMBER}:
          EOF

          # Deploy to VPS with verbose SSH output for debugging
          echo "Deploying to ${VPS_USERNAME}@${VPS_HOST}..."
          scp -v -i ~/.ssh/private.key -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new docker-compose.yml "${VPS_USERNAME}@${VPS_HOST}:/tmp/docker-compose-pr-${PR_NUMBER}.yml"

          # Prepare VPS environment and deploy
          ssh -v -i ~/.ssh/private.key -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new -T "${VPS_USERNAME}@${VPS_HOST}" << ENDSSH
            set -e
            
            # Ensure docker-compose v2 is installed
            if ! command -v docker-compose &> /dev/null; then
              if ! docker compose version &> /dev/null; then
                echo "Installing docker-compose-plugin..."
                sudo apt-get update -qq
                sudo apt-get install -y -qq docker-compose-plugin
              fi
            fi
            
            # Prepare deployment directory with proper permissions
            echo "Setting up PR deployment directory..."
            sudo mkdir -p /opt/booklore
            sudo chown -R ubuntu:ubuntu /opt/booklore
            mkdir -p /opt/booklore/pr-${PR_NUMBER}

            # Move docker-compose file
            mv /tmp/docker-compose-pr-${PR_NUMBER}.yml /opt/booklore/pr-${PR_NUMBER}/docker-compose.yml

            # Stop existing containers and start new ones
            cd /opt/booklore/pr-${PR_NUMBER}
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose pull
            docker compose up -d

            # Clean up old images (older than 1 week)
            docker image prune -af --filter "until=168h" || true

            echo "Deployment completed for PR #${PR_NUMBER}"
          ENDSSH

          echo "app_port=${APP_PORT}" >> $GITHUB_OUTPUT

      - name: Wait for application to be ready
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          APP_PORT: ${{ steps.deploy.outputs.app_port }}
        run: |
          echo "Waiting for application to start..."
          for i in {1..20}; do
            # Try multiple health check endpoints
            # First try /api/actuator/health (common Spring Boot prefix)
            if curl -s -f "http://${VPS_HOST}:${APP_PORT}/api/actuator/health" 2>/dev/null | grep -q '"status":"UP"'; then
              echo "✓ Application is healthy at /api/actuator/health"
              exit 0
            fi
            
            # Try /actuator/health directly
            if curl -s -f "http://${VPS_HOST}:${APP_PORT}/actuator/health" 2>/dev/null | grep -q '"status":"UP"'; then
              echo "✓ Application is healthy at /actuator/health"
              exit 0
            fi
            
            # Try /management/health (alternative Spring endpoint)
            if curl -s -f "http://${VPS_HOST}:${APP_PORT}/management/health" 2>/dev/null | grep -q '"status":"UP"'; then
              echo "✓ Application is healthy at /management/health"
              exit 0
            fi
            
            # Fallback: check if root responds (indicates nginx/app is running)
            if curl -s -f -I "http://${VPS_HOST}:${APP_PORT}/" 2>/dev/null | grep -q "200"; then
              echo "⚠ Application responding at root (frontend may be masking health check)"
              echo "Note: Deployment successful but health endpoint not found. Check app logs."
              exit 0
            fi
            
            echo "Waiting... ($i/20)"
            sleep 5
          done
          echo "⚠ Health check timed out, but application may still be initializing. Check deployment logs at http://${VPS_HOST}:${APP_PORT}"

      - name: Delete deployment started comment
        if: always()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.deployment-started.outputs.result }}
        with:
          script: |
            const commentId = process.env.COMMENT_ID;
            if (commentId) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: commentId
                });
              } catch (error) {
                console.log(`Could not delete deployment started comment: ${error.message}`);
              }
            }

      - name: Post deployment success to PR
        if: success()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.check-pr.outputs.pr_number }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.short }}
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          APP_PORT: ${{ steps.deploy.outputs.app_port }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            const commitHash = process.env.COMMIT_HASH;
            const dockerUser = process.env.DOCKER_USER;
            const vpsHost = process.env.VPS_HOST;
            const appPort = process.env.APP_PORT;

            const dockerImage = `${dockerUser}/booklore:pr-${prNumber}-${commitHash}`;
            const dockerImageLatest = `${dockerUser}/booklore:pr-${prNumber}`;
            const deploymentUrl = `http://${vpsHost}:${appPort}`;
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);

            const commentBody = `## 🚀 BookLore Auto-Deployment Complete!\n\n` +
              `**PR #${prNumber}** has been deployed and is ready for testing!\n\n` +
              `### 🔗 Test URL\n` +
              `**[${deploymentUrl}](${deploymentUrl})**\n\n` +
              `### 🐳 Docker Images\n` +
              `\`\`\`bash\n` +
              `# Latest for this PR\n` +
              `docker pull ${dockerImageLatest}\n\n` +
              `# Specific commit\n` +
              `docker pull ${dockerImage}\n` +
              `\`\`\`\n\n` +
              `📦 **Commit:** \`${commitHash}\`\n` +
              `⏱️ **Deployed:** ${timestamp} UTC\n\n` +
              `---\n` +
              `_This deployment will be automatically cleaned up when the PR is closed._`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });

      - name: Post deployment failure to PR
        if: failure()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.check-pr.outputs.pr_number }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## ❌ Auto-deployment failed\n\n` +
                    `The deployment for PR #${prNumber} encountered an error.\n\n` +
                    `Please check the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`
            });

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/private.key

  cleanup-deployment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Clean up deployment comments
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            
            // Find and delete deployment comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const deployComments = comments.filter(c =>
              (c.body?.includes("## 🚀 BookLore Auto-Deployment Complete!") ||
               c.body?.includes("🐳 Docker Image Published")) &&
              c.user?.type === "Bot"
            );
            
            for (const comment of deployComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id
              });
              console.log(`Deleted deployment comment (ID: ${comment.id})`);
            }

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/private.key
          chmod 600 ~/.ssh/private.key

      - name: Cleanup VPS deployment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          VPS_USERNAME="ubuntu"
          ssh -i ~/.ssh/private.key -o StrictHostKeyChecking=accept-new -T ${VPS_USERNAME}@${VPS_HOST} << ENDSSH
            set -e
            
            if [ -d "/opt/booklore/pr-${PR_NUMBER}" ]; then
              echo "Found PR directory, proceeding with cleanup..."

              # Stop and remove containers
              cd /opt/booklore/pr-${PR_NUMBER}
              docker compose down -v || true

              # Go back to root before removal
              cd /

              # Remove PR-specific directory
              rm -rf /opt/booklore/pr-${PR_NUMBER}

              # Clean up containers by name (in case compose cleanup missed them)
              docker rm -f booklore-app-pr-${PR_NUMBER} 2>/dev/null || true
              docker rm -f booklore-db-pr-${PR_NUMBER} 2>/dev/null || true

              # Remove PR-specific volumes
              docker volume rm booklore-db-pr-${PR_NUMBER} 2>/dev/null || true
              docker volume rm booklore-data-pr-${PR_NUMBER} 2>/dev/null || true
              docker volume rm booklore-books-pr-${PR_NUMBER} 2>/dev/null || true

              echo "Cleanup completed for PR #${PR_NUMBER}"
            else
              echo "PR directory not found, nothing to clean up"
            fi
            
            # Clean up old unused images
            docker image prune -af --filter "until=168h" || true
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/private.key

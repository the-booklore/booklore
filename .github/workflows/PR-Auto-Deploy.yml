name: Deploy PR Preview

on:
  issue_comment:
    types: [created]

concurrency:
  group: deploy-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  deploy-pr:
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/deploy-pr')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: React to Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR Branch
        uses: xt0rted/pull-request-comment-branch@v2
        id: comment-branch

      - name: Set PR Number
        id: refs
        run: echo "PR_NUM=${{ github.event.issue.number }}" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.comment-branch.outputs.head_ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      # Required for Cross-Platform Builds (AMD64 -> ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push PR Image (ARM64)
        timeout-minutes: 40 # Increased timeout for slow emulation
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          # STRICTLY build for ARM64 to match your VPS
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ env.PR_NUM }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            PR_NUM=${{ env.PR_NUM }}
            APP_PORT=$((6000 + PR_NUM))
            DOCKER_USER=${{ secrets.DOCKER_HUB_USERNAME }}
            
            mkdir -p ~/deployments/pr-${PR_NUM}
            cd ~/deployments/pr-${PR_NUM}

            # 1. Create .env file for Docker Compose
            # This is safer than injecting variables directly into the YML
            cat > .env <<EOF
            PR_NUM=${PR_NUM}
            APP_PORT=${APP_PORT}
            DOCKER_USER=${DOCKER_USER}
            EOF

            # 2. Create docker-compose.yml
            # We use single quotes ('EOF') here so the variables ${VAR} 
            # are NOT replaced by bash, but are left for Docker Compose to read from .env
            cat > docker-compose.yml << 'EOF'
            services:
              booklore:
                image: ${DOCKER_USER}/booklore:pr-${PR_NUM}
                container_name: booklore-pr-${PR_NUM}
                environment:
                  - TZ=Etc/UTC
                  - SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/booklore?useSSL=false&allowPublicKeyRetrieval=true
                  - SPRING_DATASOURCE_USERNAME=booklore
                  - SPRING_DATASOURCE_PASSWORD=pr_pass_${PR_NUM}
                  - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver
                  - SPRING_JPA_HIBERNATE_DDL_AUTO=update
                depends_on:
                  mariadb:
                    condition: service_healthy
                ports:
                  - "${APP_PORT}:6060"
                volumes:
                  - ./data:/app/data
                  - ./books:/books
                  - ./bookdrop:/bookdrop
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:6060/actuator/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 90s

              mariadb:
                image: lscr.io/linuxserver/mariadb:11.4.5
                container_name: mariadb-pr-${PR_NUM}
                environment:
                  - PUID=1000
                  - PGID=1000
                  - TZ=Etc/UTC
                  - MYSQL_ROOT_PASSWORD=pr_root_${PR_NUM}
                  - MYSQL_DATABASE=booklore
                  - MYSQL_USER=booklore
                  - MYSQL_PASSWORD=pr_pass_${PR_NUM}
                volumes:
                  - ./mariadb_data:/config
                healthcheck:
                  test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
            EOF

            # Pull the new ARM image and restart
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Cleanup space
            docker image prune -f

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = parseInt(process.env.PR_NUM);
            const port = 6000 + prNum;
            github.rest.issues.createComment({
              issue_number: prNum,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **PR Preview Deployed!**\n\n- **URL**: http://${{ secrets.VPS_HOST }}:${port}\n\n*Note: This build took a while because we are cross-compiling for ARM.*`
            })
        env:
          PR_NUM: ${{ env.PR_NUM }}

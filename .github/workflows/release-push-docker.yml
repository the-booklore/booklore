# Push BookLore Docker Workflow
#
# Purpose: Builds and pushes Docker images for BookLore to container registries
# Significance: Enables deployment of the application to containerized environments
# Key Functions:
# - Builds multi-architecture images (AMD64 and ARM64) in parallel for speed
# - Pushes images to both Docker Hub and GitHub Container Registry
# - Creates multi-arch manifests combining AMD64 and ARM64 images
# - Runs on both branch pushes and version tag events
# - Uses build cache to speed up builds on native architecture runners
name: Push BookLore Docker

on:
  push:
    branches: [ "develop" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

jobs:
  # Build AMD64 and ARM64 in parallel on native runners for speed
  build-amd64:
    name: Build AMD64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}
          flavor: |
            suffix=-amd64

      - name: Build and Push AMD64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=amd64
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-amd64
          cache-to: type=gha,scope=amd64,mode=max

  build-arm64:
    name: Build ARM64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/booklore
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}
          flavor: |
            suffix=-arm64

      - name: Build and Push ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=arm64
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-arm64
          cache-to: type=gha,scope=arm64,mode=max

  # Create multi-arch manifest after both builds complete
  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Version
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Docker Hub Manifest
        env:
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Create manifest for latest or version tag
          docker manifest create ${DOCKER_USER}/booklore:${VERSION} \
            ${DOCKER_USER}/booklore:${VERSION}-amd64 \
            ${DOCKER_USER}/booklore:${VERSION}-arm64
          
          docker manifest push ${DOCKER_USER}/booklore:${VERSION}
          
          echo "✓ Pushed multi-arch manifest: ${DOCKER_USER}/booklore:${VERSION}"

      - name: Create and Push GHCR Manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GHCR_IMAGE="ghcr.io/${{ github.repository }}"
          
          docker manifest create ${GHCR_IMAGE}:${VERSION} \
            ${GHCR_IMAGE}:${VERSION}-amd64 \
            ${GHCR_IMAGE}:${VERSION}-arm64
          
          docker manifest push ${GHCR_IMAGE}:${VERSION}
          
          echo "✓ Pushed multi-arch manifest: ${GHCR_IMAGE}:${VERSION}"

# ============================================
# Enhanced Security Scan
# ============================================
# This workflow provides comprehensive security scanning including:
# 1. OWASP Dependency Check for known CVEs in libraries
# 2. Secret scanning with Gitleaks
# 3. SAST scanning with Semgrep
# 4. Container image vulnerability scanning
# 5. License compliance checking
#
# Critical for Booklore because:
# - PDF/EPUB parsing libraries frequently have CVEs
# - Self-hosted apps must be secure by default
# ============================================

name: Enhanced Security Scan

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_call:
    inputs:
      full_scan:
        description: 'Run full dependency scan (slower, more comprehensive)'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full dependency scan (slower, more comprehensive)'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

jobs:
  # ============================================
  # Secret Scanning (Gitleaks)
  # DISABLED - Requires organization license

# Build and Test BookLore Workflow
#
# Purpose: Runs comprehensive build and test suite for every pull request to ensure code quality
# Significance: Critical quality gate that prevents broken code from being merged to develop/main
# Key Functions:
# - Tests frontend with Jest and builds Angular application
# - Tests backend with JUnit and builds Spring Boot JAR
# - Creates Docker image to verify build process works in containerized environment
# - Runs on both AMD64 and ARM64 architectures to ensure platform compatibility
# - Publishes test results to GitHub for easy review
name: Build and Test BookLore

on:
  pull_request:
    branches: ["develop", "main"]
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # Frontend Tests
  # ============================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-ui
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        
      - name: Run linting
        run: npm run lint || true
        
      - name: Run unit tests
        run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless --code-coverage
        
      - name: Build frontend
        run: npm run build -- --configuration=production

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: booklore-ui/dist/
          retention-days: 7

  # ============================================
  # Backend Tests
  # ============================================
  test-backend:
    name: Backend Tests (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21']
      fail-fast: false
    defaults:
      run:
        working-directory: ./booklore-api
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      
      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/develop' }}
          
      - name: Run tests with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon
        
      - name: Build JAR artifact
        run: ./gradlew bootJar -x test --no-daemon
        
      - name: Generate test report
        if: always()
        run: ./gradlew jacocoTestReport --no-daemon || true

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-${{ matrix.java-version }}
          path: booklore-api/build/libs/*.jar
          retention-days: 7
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java-version }}
          path: |
            booklore-api/build/reports/tests/
            booklore-api/build/reports/jacoco/
          retention-days: 7

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: booklore-api/build/test-results/**/*.xml
          check_name: Backend Test Results (JDK ${{ matrix.java-version }})
          comment_mode: off
          check_run: false

  # ============================================
  # Docker Build Test (no push)
  # ============================================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image (amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: booklore:test
          cache-from: |
            type=gha
            type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache-amd64
          cache-to: type=gha,mode=max


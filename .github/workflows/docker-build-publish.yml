name: Build Docker Image and Upload Artifact

on:
  push:
    branches:
      - "**"

jobs:
  build-and-save-image:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      issues: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Run Backend Tests
        id: backend_tests
        working-directory: ./booklore-api
        run: |
          echo "Running backend tests with testcontainers..."
          ./gradlew test
        continue-on-error: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: booklore-api/build/test-results/**/*.xml
          check_name: Backend Test Results
          comment_title: Backend Test Results
          report_individual_runs: true
          report_suite_logs: "any"

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            booklore-api/build/reports/tests/
            booklore-api/build/test-results/
          retention-days: 30

      - name: Check Test Results
        if: steps.backend_tests.outcome == 'failure'
        run: |
          echo "❌ Backend tests failed! Check the test results above."
          exit 1

      - name: Generate Image Tag
        id: set_image_tag
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          short_sha=$(git rev-parse --short HEAD)
          image_tag="${branch}-${short_sha}"
          echo "image_tag=$image_tag" >> $GITHUB_ENV
          echo "Image tag: $image_tag"

      - name: Build Docker Image (amd64) with Buildx
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            --build-arg APP_VERSION=${{ env.image_tag }} \
            --build-arg APP_REVISION=${{ github.sha }} \
            --tag booklore/booklore:${{ env.image_tag }} \
            --load .

      - name: Save Docker Image to Tarball
        run: |
          mkdir -p dist
          docker save booklore/booklore:${{ env.image_tag }} -o dist/booklore-${{ env.image_tag }}.tar
          ls -lh dist

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ env.image_tag }}
          path: dist/booklore-${{ env.image_tag }}.tar
          retention-days: 7

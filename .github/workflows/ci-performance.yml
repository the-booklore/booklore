name: CI Performance Monitoring

on:
  workflow_run:
    workflows:
      - "Build and Test BookLore"
      - "Test Coverage Report"
      - "Type Checking & Compilation"
    types:
      - completed

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  monitor-performance:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Workflow Run Duration
        id: duration
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const run = context.payload.workflow_run;
            const startTime = new Date(run.created_at);
            const endTime = new Date(run.updated_at);
            const durationMs = endTime - startTime;
            const durationMinutes = Math.round(durationMs / 60000 * 100) / 100;
            
            console.log(`Workflow: ${run.name}`);
            console.log(`Duration: ${durationMinutes} minutes`);
            console.log(`Conclusion: ${run.conclusion}`);
            console.log(`Run ID: ${run.id}`);
            
            core.setOutput('duration_minutes', durationMinutes);
            core.setOutput('workflow_name', run.name);
            core.setOutput('conclusion', run.conclusion);
            core.setOutput('run_id', run.id);
            core.setOutput('run_url', run.html_url);
            
            // Alert threshold: 10 minutes for most workflows
            const thresholds = {
              'Build and Test BookLore': 15,
              'Test Coverage Report': 10,
              'Type Checking & Compilation': 5
            };
            
            const threshold = thresholds[run.name] || 10;
            const isRegression = durationMinutes > threshold;
            
            core.setOutput('is_regression', isRegression);
            core.setOutput('threshold', threshold);
            
            return { durationMinutes, isRegression, threshold };

      - name: Alert on Performance Regression
        if: steps.duration.outputs.is_regression == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { owner, repo } = context.repo;
            const duration = '${{ steps.duration.outputs.duration_minutes }}';
            const threshold = '${{ steps.duration.outputs.threshold }}';
            const workflowName = '${{ steps.duration.outputs.workflow_name }}';
            const runUrl = '${{ steps.duration.outputs.run_url }}';
            
            // Check for existing performance issue
            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ci-performance'
            });
            
            const existingIssue = issues.data.find(i => 
              i.title.includes('CI Performance Regression')
            );
            
            const body = `## ⚠️ CI Performance Regression Detected
            
            | Metric | Value |
            |--------|-------|
            | Workflow | ${workflowName} |
            | Duration | ${duration} minutes |
            | Threshold | ${threshold} minutes |
            | Run | [View Run](${runUrl}) |
            
            The workflow took longer than expected. Please investigate:
            - Check for slow tests or builds
            - Review recent changes that might affect performance
            - Consider optimizing caching strategies
            `;
            
            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: '⚠️ CI Performance Regression Detected',
                body,
                labels: ['ci-performance', 'needs-investigation']
              });
            }

  monitor-docker-size:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.name == 'Build and Test BookLore'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build Docker image for size check
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: booklore:size-check
          platforms: linux/amd64

      - name: Check Docker image size
        id: size
        run: |
          SIZE_BYTES=$(docker image inspect booklore:size-check --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "Docker image size: ${SIZE_MB}MB"
          
          # Alert if image exceeds 500MB
          if [ $SIZE_MB -gt 500 ]; then
            echo "is_large=true" >> $GITHUB_OUTPUT
          else
            echo "is_large=false" >> $GITHUB_OUTPUT
          fi

      - name: Alert on large Docker image
        if: steps.size.outputs.is_large == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { owner, repo } = context.repo;
            const sizeMB = '${{ steps.size.outputs.size_mb }}';
            
            await github.rest.issues.create({
              owner,
              repo,
              title: '⚠️ Docker Image Size Alert',
              body: `## Docker Image Size Warning
              
              The Docker image has grown to **${sizeMB}MB**, exceeding the 500MB threshold.
              
              Consider:
              - Using multi-stage builds more effectively
              - Removing unnecessary dependencies
              - Using Alpine-based images
              - Cleaning build caches
              `,
              labels: ['docker', 'needs-investigation']
            });

name: Type Checking & Compilation

on:
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  typescript-check:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-ui

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Type Check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build Production
        run: npm run build -- --configuration=production
        continue-on-error: false

  java-compilation:
    name: Java Compilation Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./booklore-api

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compile Backend
        run: ./gradlew compileJava compileTestJava --no-daemon
        continue-on-error: false

name: Publish PR Image

on:
  issue_comment:
    types: [created]

jobs:
  publish:
    # Only run if it's a PR and comment contains /publish-pr
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/publish-pr')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Add Reaction
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      # CRITICAL: Get the branch name of the PR, not the default branch
      - name: Get PR Branch
        uses: xt0rted/pull-request-comment-branch@v2
        id: comment-branch

      - name: Set PR Environment Variables
        run: echo "PR_NUM=${{ github.event.issue.number }}" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.comment-branch.outputs.head_ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push (ARM64)
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./testing/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ env.PR_NUM }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/booklore:buildcache,mode=max

      - name: Comment Image Location
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = process.env.PR_NUM;
            const user = '${{ secrets.DOCKER_HUB_USERNAME }}';
            const tag = `pr-${prNum}`;
            const image = `${user}/booklore:${tag}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📦 **Docker Image Published!**\n\n\`\`\`bash\ndocker pull ${image}\n\`\`\`\n\n- **Tag**: \`${tag}\`\n- **Platform**: \`linux/arm64\``
            })

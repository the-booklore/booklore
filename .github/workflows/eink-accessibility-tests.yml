name: E-Ink Simulation & Accessibility Tests

# Tests web UI for e-reader compatibility using Playwright with e-ink media queries
# and axe-core for WCAG accessibility compliance (which correlates with e-ink readability)
# Based on: "Simulation Strategies: Web and Visual Regression" methodology

on:
  push:
    branches: [main, develop]
    paths:
      - 'booklore-ui/**'
      - '.github/workflows/eink-accessibility-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'booklore-ui/**'
      - '.github/workflows/eink-accessibility-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  APP_PORT: 6060

jobs:
  # ============================================
  # E-Ink Simulation with Playwright
  # ============================================
  eink-simulation-tests:
    name: E-Ink Device Simulation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: booklore
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -ptestroot --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Playwright test directory
        run: |
          mkdir -p testing/playwright
          mkdir -p testing/playwright/screenshots

      - name: Create Playwright configuration
        run: |
          cat > testing/playwright/playwright.config.ts << 'EOF'
          import { defineConfig, devices } from '@playwright/test';

          // Kobo Libra 2 specifications
          const KOBO_LIBRA_2 = {
            viewport: { width: 1264, height: 1680 },  // 7" display at 300 PPI
            userAgent: 'Mozilla/5.0 (Linux; Android 6.0.1; Kobo Libra 2) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/79.0.3945.136 Safari/537.36',
            colorScheme: 'light' as const,
            reducedMotion: 'reduce' as const,
          };

          // Kobo Elipsa specifications
          const KOBO_ELIPSA = {
            viewport: { width: 1404, height: 1872 },  // 10.3" display
            userAgent: 'Mozilla/5.0 (Linux; Android 6.0.1; Kobo Elipsa) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/79.0.3945.136 Safari/537.36',
            colorScheme: 'light' as const,
            reducedMotion: 'reduce' as const,
          };

          // PocketBook Era specifications
          const POCKETBOOK_ERA = {
            viewport: { width: 1264, height: 1680 },
            userAgent: 'Mozilla/5.0 (Linux; U; Android 4.4.2; en-us; PocketBook Era) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/30.0.0.0 Safari/537.36',
            colorScheme: 'light' as const,
            reducedMotion: 'reduce' as const,
          };

          export default defineConfig({
            testDir: '.',
            fullyParallel: true,
            forbidOnly: !!process.env.CI,
            retries: process.env.CI ? 2 : 0,
            workers: process.env.CI ? 1 : undefined,
            reporter: [
              ['html', { outputFolder: 'playwright-report' }],
              ['json', { outputFile: 'test-results.json' }],
            ],
            use: {
              baseURL: process.env.BASE_URL || 'http://localhost:6060',
              trace: 'on-first-retry',
              screenshot: 'only-on-failure',
            },
            projects: [
              {
                name: 'kobo-libra-2',
                use: { ...devices['Desktop Chrome'], ...KOBO_LIBRA_2 },
              },
              {
                name: 'kobo-elipsa',
                use: { ...devices['Desktop Chrome'], ...KOBO_ELIPSA },
              },
              {
                name: 'pocketbook-era',
                use: { ...devices['Desktop Chrome'], ...POCKETBOOK_ERA },
              },
            ],
          });
          EOF

      - name: Create E-Ink simulation tests
        run: |
          cat > testing/playwright/eink-simulation.spec.ts << 'EOF'
          import { test, expect, Page } from '@playwright/test';

          // CSS to inject for e-ink simulation
          const EINK_SIMULATION_CSS = `
            /* Simulate e-ink grayscale display */
            html {
              filter: grayscale(100%) !important;
            }
            
            /* Disable all animations (e-ink refresh rate is ~1Hz) */
            *, *::before, *::after {
              animation-duration: 0s !important;
              animation-delay: 0s !important;
              transition-duration: 0s !important;
              transition-delay: 0s !important;
            }
            
            /* Force high contrast for e-ink readability */
            @media (prefers-contrast: more) {
              body {
                --text-color: #000000;
                --bg-color: #ffffff;
              }
            }
          `;

          // Helper to inject e-ink simulation styles
          async function injectEinkSimulation(page: Page): Promise<void> {
            await page.addStyleTag({ content: EINK_SIMULATION_CSS });
          }

          // Helper to take e-ink screenshot
          async function takeEinkScreenshot(page: Page, name: string): Promise<void> {
            await injectEinkSimulation(page);
            await page.waitForTimeout(500); // Wait for styles to apply
            await page.screenshot({ 
              path: `screenshots/${name}-eink.png`,
              fullPage: true 
            });
          }

          test.describe('E-Ink Device Simulation', () => {
            
            test.beforeEach(async ({ page }) => {
              // Set e-ink specific media features via CDP
              const client = await page.context().newCDPSession(page);
              await client.send('Emulation.setEmulatedMedia', {
                features: [
                  { name: 'prefers-color-scheme', value: 'light' },
                  { name: 'prefers-reduced-motion', value: 'reduce' },
                  { name: 'prefers-contrast', value: 'more' },
                  // Note: 'update: slow' is not directly settable via CDP
                ]
              });
            });

            test('login page renders correctly on e-ink', async ({ page }) => {
              await page.goto('/');
              await takeEinkScreenshot(page, 'login-page');
              
              // Verify essential elements are visible
              await expect(page.locator('input[type="text"], input[type="email"], input[name="username"]').first()).toBeVisible();
              await expect(page.locator('input[type="password"]').first()).toBeVisible();
              await expect(page.locator('button[type="submit"], button:has-text("Login"), button:has-text("Sign")').first()).toBeVisible();
            });

            test('no CSS animations are running', async ({ page }) => {
              await page.goto('/');
              await injectEinkSimulation(page);
              
              // Check that no elements have active animations
              const animatedElements = await page.evaluate(() => {
                const elements = document.querySelectorAll('*');
                const animated: string[] = [];
                elements.forEach((el) => {
                  const style = window.getComputedStyle(el);
                  if (style.animationName !== 'none' && style.animationDuration !== '0s') {
                    animated.push(el.tagName + (el.className ? '.' + el.className : ''));
                  }
                });
                return animated;
              });
              
              if (animatedElements.length > 0) {
                console.log('⚠️ Elements with animations:', animatedElements.slice(0, 5));
              }
              
              // After our CSS injection, animations should be disabled
              await page.waitForTimeout(100);
              const animatedAfterInjection = await page.evaluate(() => {
                const elements = document.querySelectorAll('*');
                let count = 0;
                elements.forEach((el) => {
                  const style = window.getComputedStyle(el);
                  if (style.animationDuration !== '0s') {
                    count++;
                  }
                });
                return count;
              });
              
              expect(animatedAfterInjection).toBe(0);
            });

            test('text has sufficient size for e-ink readability', async ({ page }) => {
              await page.goto('/');
              
              // E-ink displays need minimum 12px font size for readability
              const smallTextElements = await page.evaluate(() => {
                const elements = document.querySelectorAll('*');
                const small: { tag: string; size: string }[] = [];
                elements.forEach((el) => {
                  const style = window.getComputedStyle(el);
                  const fontSize = parseFloat(style.fontSize);
                  if (fontSize < 12 && el.textContent?.trim()) {
                    small.push({ 
                      tag: el.tagName, 
                      size: style.fontSize 
                    });
                  }
                });
                return small.slice(0, 10);
              });
              
              if (smallTextElements.length > 0) {
                console.log('⚠️ Small text elements found:', smallTextElements);
              }
              
              // Warning but not failure - just log for review
              expect(smallTextElements.length).toBeLessThan(20);
            });

            test('touch targets are large enough for e-ink devices', async ({ page }) => {
              await page.goto('/');
              
              // E-ink devices need larger touch targets (minimum 44x44px recommended)
              const smallTouchTargets = await page.evaluate(() => {
                const interactive = document.querySelectorAll('button, a, input, [role="button"], [onclick]');
                const small: { tag: string; width: number; height: number }[] = [];
                interactive.forEach((el) => {
                  const rect = el.getBoundingClientRect();
                  if ((rect.width < 44 || rect.height < 44) && rect.width > 0) {
                    small.push({ 
                      tag: el.tagName, 
                      width: Math.round(rect.width), 
                      height: Math.round(rect.height) 
                    });
                  }
                });
                return small.slice(0, 10);
              });
              
              if (smallTouchTargets.length > 0) {
                console.log('⚠️ Small touch targets:', smallTouchTargets);
              }
            });

            test('images have alt text for accessibility', async ({ page }) => {
              await page.goto('/');
              
              const imagesWithoutAlt = await page.evaluate(() => {
                const images = document.querySelectorAll('img');
                const missing: string[] = [];
                images.forEach((img) => {
                  if (!img.alt && !img.getAttribute('aria-label')) {
                    missing.push(img.src.substring(0, 50));
                  }
                });
                return missing;
              });
              
              if (imagesWithoutAlt.length > 0) {
                console.log('⚠️ Images without alt text:', imagesWithoutAlt);
              }
            });
          });

          test.describe('E-Ink Color Contrast Verification', () => {
            
            test('verify grayscale rendering preserves readability', async ({ page }) => {
              await page.goto('/');
              await injectEinkSimulation(page);
              
              // Take both color and grayscale screenshots for comparison
              await page.screenshot({ 
                path: 'screenshots/comparison-grayscale.png',
                fullPage: true 
              });
              
              // Check for color-only indicators (elements that rely solely on color)
              const colorOnlyElements = await page.evaluate(() => {
                const elements = document.querySelectorAll('.error, .warning, .success, .danger, [class*="red"], [class*="green"]');
                const issues: string[] = [];
                elements.forEach((el) => {
                  // Check if element has only color as distinguishing feature
                  const style = window.getComputedStyle(el);
                  const hasIcon = el.querySelector('svg, i, [class*="icon"]');
                  const hasText = el.textContent?.trim();
                  
                  if (!hasIcon && !hasText) {
                    issues.push(el.className);
                  }
                });
                return issues.slice(0, 5);
              });
              
              if (colorOnlyElements.length > 0) {
                console.log('⚠️ Potential color-only indicators:', colorOnlyElements);
              }
            });
          });
          EOF

      - name: Create package.json for Playwright tests
        run: |
          cat > testing/playwright/package.json << 'EOF'
          {
            "name": "booklore-eink-tests",
            "version": "1.0.0",
            "scripts": {
              "test": "playwright test",
              "test:eink": "playwright test eink-simulation.spec.ts",
              "test:a11y": "playwright test accessibility.spec.ts",
              "report": "playwright show-report"
            },
            "devDependencies": {
              "@playwright/test": "^1.40.0",
              "@axe-core/playwright": "^4.8.0"
            }
          }
          EOF

      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mariadb-admin ping -h 127.0.0.1 -uroot -ptestroot --silent 2>/dev/null; then
              echo "✅ MariaDB is ready"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Build and start application
        working-directory: booklore-api
        env:
          SWAGGER_ENABLED: 'true'
        run: |
          ./gradlew bootJar -x test --no-daemon
          
          JAR=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          
          java -jar "$JAR" \
            --server.port=${{ env.APP_PORT }} \
            --spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/booklore \
            --spring.datasource.username=root \
            --spring.datasource.password=testroot \
            --app.bookdrop-folder=/tmp/bookdrop \
            --app.path-config=/tmp/booklore-data \
            > /tmp/booklore.log 2>&1 &
          
          echo $! > /tmp/booklore.pid
          
          for i in {1..60}; do
            if curl -s http://localhost:${{ env.APP_PORT }}/actuator/health | grep -q "UP"; then
              echo "✅ Application started on port ${{ env.APP_PORT }}"
              exit 0
            fi
            echo "Waiting for app... ($i/60)"
            sleep 3
          done
          echo "❌ Application failed to start"
          cat /tmp/booklore.log | tail -50
          exit 1

      - name: Install Playwright and dependencies
        working-directory: testing/playwright
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run E-Ink simulation tests
        working-directory: testing/playwright
        env:
          BASE_URL: http://localhost:${{ env.APP_PORT }}
        run: |
          npx playwright test eink-simulation.spec.ts --reporter=html || true

      - name: Upload E-Ink screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eink-screenshots
          path: testing/playwright/screenshots/
          retention-days: 14

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eink-playwright-report
          path: testing/playwright/playwright-report/
          retention-days: 7

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/booklore.pid ]; then
            kill $(cat /tmp/booklore.pid) 2>/dev/null || true
          fi

  # ============================================
  # Accessibility Testing with axe-core
  # ============================================
  accessibility-tests:
    name: WCAG Accessibility Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: booklore
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -ptestroot --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create accessibility test directory
        run: mkdir -p testing/playwright

      - name: Create axe-core accessibility tests
        run: |
          cat > testing/playwright/accessibility.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';
          import AxeBuilder from '@axe-core/playwright';

          // WCAG 2.1 AA is the minimum standard
          // WCAG 2.1 AAA provides enhanced contrast (better for e-ink)
          const WCAG_STANDARD = 'wcag21aa';

          interface AxeViolation {
            id: string;
            impact: string;
            description: string;
            nodes: { html: string }[];
          }

          test.describe('WCAG Accessibility Compliance', () => {
            
            test('login page meets WCAG 2.1 AA standards', async ({ page }) => {
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              const accessibilityResults = await new AxeBuilder({ page })
                .withTags(['wcag2a', 'wcag2aa', 'wcag21aa'])
                .analyze();
              
              // Log violations for debugging
              if (accessibilityResults.violations.length > 0) {
                console.log('Accessibility violations found:');
                accessibilityResults.violations.forEach((violation: AxeViolation) => {
                  console.log(`  - ${violation.id}: ${violation.impact}`);
                  console.log(`    ${violation.description}`);
                  violation.nodes.slice(0, 2).forEach(node => {
                    console.log(`    Element: ${node.html.substring(0, 100)}`);
                  });
                });
              }
              
              // Filter for critical and serious issues only
              const criticalViolations = accessibilityResults.violations.filter(
                (v: AxeViolation) => v.impact === 'critical' || v.impact === 'serious'
              );
              
              expect(criticalViolations).toHaveLength(0);
            });

            test('color contrast meets WCAG AA (4.5:1 ratio)', async ({ page }) => {
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              const contrastResults = await new AxeBuilder({ page })
                .withTags(['cat.color'])
                .analyze();
              
              const contrastViolations = contrastResults.violations.filter(
                (v: AxeViolation) => v.id === 'color-contrast' || v.id === 'color-contrast-enhanced'
              );
              
              if (contrastViolations.length > 0) {
                console.log('⚠️ Color contrast issues (problematic for e-ink):');
                contrastViolations.forEach((violation: AxeViolation) => {
                  violation.nodes.slice(0, 5).forEach(node => {
                    console.log(`  - ${node.html.substring(0, 80)}`);
                  });
                });
              }
              
              // E-ink displays need high contrast - fail on any contrast issues
              expect(contrastViolations).toHaveLength(0);
            });

            test('text alternatives exist for non-text content', async ({ page }) => {
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              const altTextResults = await new AxeBuilder({ page })
                .withTags(['cat.text-alternatives'])
                .analyze();
              
              // Check for missing alt text on images
              const altViolations = altTextResults.violations.filter(
                (v: AxeViolation) => v.id === 'image-alt' || v.id === 'input-image-alt'
              );
              
              if (altViolations.length > 0) {
                console.log('⚠️ Missing alt text (required for accessibility):');
                altViolations.forEach((violation: AxeViolation) => {
                  violation.nodes.slice(0, 3).forEach(node => {
                    console.log(`  - ${node.html.substring(0, 80)}`);
                  });
                });
              }
            });

            test('form elements have proper labels', async ({ page }) => {
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              const formResults = await new AxeBuilder({ page })
                .withTags(['cat.forms'])
                .analyze();
              
              const labelViolations = formResults.violations.filter(
                (v: AxeViolation) => v.id === 'label' || v.id === 'label-title-only'
              );
              
              expect(labelViolations).toHaveLength(0);
            });

            test('keyboard navigation is functional', async ({ page }) => {
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              const keyboardResults = await new AxeBuilder({ page })
                .withTags(['cat.keyboard'])
                .analyze();
              
              const keyboardViolations = keyboardResults.violations.filter(
                (v: AxeViolation) => v.impact === 'critical' || v.impact === 'serious'
              );
              
              if (keyboardViolations.length > 0) {
                console.log('⚠️ Keyboard navigation issues:');
                keyboardViolations.forEach((violation: AxeViolation) => {
                  console.log(`  - ${violation.id}: ${violation.description}`);
                });
              }
              
              expect(keyboardViolations).toHaveLength(0);
            });

            test('focus indicators are visible', async ({ page }) => {
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              // Tab through focusable elements and check for visible focus
              const focusableElements = await page.locator('button, a, input, [tabindex]:not([tabindex="-1"])').count();
              
              let visibleFocusCount = 0;
              for (let i = 0; i < Math.min(focusableElements, 10); i++) {
                await page.keyboard.press('Tab');
                
                // Check if focused element has visible focus indicator
                const hasFocusStyle = await page.evaluate(() => {
                  const focused = document.activeElement;
                  if (!focused) return false;
                  
                  const style = window.getComputedStyle(focused);
                  const outline = style.outline;
                  const boxShadow = style.boxShadow;
                  const border = style.border;
                  
                  // Check if any focus indicator is present
                  return (
                    (outline && outline !== 'none' && !outline.includes('0px')) ||
                    (boxShadow && boxShadow !== 'none') ||
                    focused.matches(':focus-visible')
                  );
                });
                
                if (hasFocusStyle) visibleFocusCount++;
              }
              
              // At least 70% of elements should have visible focus
              const focusRatio = visibleFocusCount / Math.min(focusableElements, 10);
              console.log(`Focus visibility: ${visibleFocusCount}/${Math.min(focusableElements, 10)} (${(focusRatio * 100).toFixed(0)}%)`);
              
              expect(focusRatio).toBeGreaterThan(0.5);
            });
          });

          test.describe('E-Ink Specific Accessibility', () => {
            
            test('reduced motion preference is respected', async ({ page }) => {
              // Set reduced motion preference
              await page.emulateMedia({ reducedMotion: 'reduce' });
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              // Check for CSS that respects prefers-reduced-motion
              const respectsReducedMotion = await page.evaluate(() => {
                const stylesheets = Array.from(document.styleSheets);
                let hasReducedMotionRule = false;
                
                try {
                  stylesheets.forEach(sheet => {
                    try {
                      const rules = Array.from(sheet.cssRules || []);
                      rules.forEach(rule => {
                        if (rule instanceof CSSMediaRule) {
                          if (rule.conditionText?.includes('prefers-reduced-motion')) {
                            hasReducedMotionRule = true;
                          }
                        }
                      });
                    } catch (e) {
                      // Cross-origin stylesheets will throw
                    }
                  });
                } catch (e) {
                  // Ignore errors
                }
                
                return hasReducedMotionRule;
              });
              
              console.log(`Reduced motion CSS rules: ${respectsReducedMotion ? 'Found' : 'Not found'}`);
            });

            test('light color scheme is properly supported', async ({ page }) => {
              await page.emulateMedia({ colorScheme: 'light' });
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              
              // Check that background is light (for e-ink readability)
              const backgroundColor = await page.evaluate(() => {
                const body = document.body;
                const style = window.getComputedStyle(body);
                return style.backgroundColor;
              });
              
              console.log(`Body background color: ${backgroundColor}`);
              
              // Parse RGB and check if it's light (R, G, B all > 200)
              const rgbMatch = backgroundColor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
              if (rgbMatch) {
                const [, r, g, b] = rgbMatch.map(Number);
                const isLight = r > 200 && g > 200 && b > 200;
                console.log(`Background is ${isLight ? 'light' : 'dark'} (RGB: ${r}, ${g}, ${b})`);
              }
            });
          });
          EOF

      - name: Update package.json with axe-core
        run: |
          cat > testing/playwright/package.json << 'EOF'
          {
            "name": "booklore-accessibility-tests",
            "version": "1.0.0",
            "scripts": {
              "test": "playwright test",
              "test:a11y": "playwright test accessibility.spec.ts"
            },
            "devDependencies": {
              "@playwright/test": "^1.40.0",
              "@axe-core/playwright": "^4.8.0",
              "typescript": "^5.3.0"
            }
          }
          EOF

      - name: Create tsconfig for Playwright
        run: |
          cat > testing/playwright/tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "commonjs",
              "strict": true,
              "esModuleInterop": true,
              "skipLibCheck": true
            }
          }
          EOF

      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mariadb-admin ping -h 127.0.0.1 -uroot -ptestroot --silent 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Build and start application
        working-directory: booklore-api
        run: |
          ./gradlew bootJar -x test --no-daemon
          
          JAR=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          
          java -jar "$JAR" \
            --server.port=${{ env.APP_PORT }} \
            --spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/booklore \
            --spring.datasource.username=root \
            --spring.datasource.password=testroot \
            --app.bookdrop-folder=/tmp/bookdrop \
            --app.path-config=/tmp/booklore-data \
            > /tmp/booklore.log 2>&1 &
          
          echo $! > /tmp/booklore.pid
          
          for i in {1..60}; do
            if curl -s http://localhost:${{ env.APP_PORT }}/actuator/health | grep -q "UP"; then
              echo "✅ Application started"
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Install Playwright and axe-core
        working-directory: testing/playwright
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run accessibility tests
        working-directory: testing/playwright
        env:
          BASE_URL: http://localhost:${{ env.APP_PORT }}
        run: |
          npx playwright test accessibility.spec.ts --reporter=html

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: testing/playwright/playwright-report/
          retention-days: 7

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/booklore.pid ]; then
            kill $(cat /tmp/booklore.pid) 2>/dev/null || true
          fi

  # ============================================
  # Summary
  # ============================================
  eink-a11y-summary:
    name: E-Ink & Accessibility Summary
    runs-on: ubuntu-latest
    needs: [eink-simulation-tests, accessibility-tests]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# 📱 E-Ink Simulation & Accessibility Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests web UI compatibility with e-reader devices and WCAG accessibility standards." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E-Ink Device Simulation | ${{ needs.eink-simulation-tests.result == 'success' && '✅ Pass' || (needs.eink-simulation-tests.result == 'skipped' && '⏭️ Skip' || '❌ Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WCAG Accessibility Audit | ${{ needs.accessibility-tests.result == 'success' && '✅ Pass' || (needs.accessibility-tests.result == 'skipped' && '⏭️ Skip' || '❌ Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Simulated Devices" >> $GITHUB_STEP_SUMMARY
          echo "- Kobo Libra 2 (7\" 1264x1680 @ 300 PPI)" >> $GITHUB_STEP_SUMMARY
          echo "- Kobo Elipsa (10.3\" 1404x1872)" >> $GITHUB_STEP_SUMMARY
          echo "- PocketBook Era (7\" 1264x1680)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Checks Performed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Grayscale rendering simulation" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Animation detection & disabling" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Touch target size verification (44x44px min)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ WCAG 2.1 AA color contrast (4.5:1 ratio)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Keyboard navigation" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Focus indicator visibility" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ prefers-reduced-motion support" >> $GITHUB_STEP_SUMMARY


name: PR Preview - Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-pr:
    name: Cleanup PR Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Cleanup VPS Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            PR_NUM=${{ github.event.number }}
            
            # Check if deployment exists
            if [ -d ~/deployments/pr-${PR_NUM} ]; then
              cd ~/deployments/pr-${PR_NUM}
              
              # Stop and remove containers
              docker compose down -v --remove-orphans || true
              
              # Clean up directory
              cd ..
              rm -rf pr-${PR_NUM}
              
              echo "✓ Cleaned up PR #${PR_NUM} deployment"
            else
              echo "No deployment found for PR #${PR_NUM}"
            fi

      - name: Remove Docker Image from Registry
        continue-on-error: true
        run: |
          # Note: Docker Hub doesn't support direct image deletion via API
          # The image will be automatically cleaned up by Docker Hub retention policies
          # or can be manually removed
          echo "Image ${{ secrets.DOCKER_HUB_USERNAME }}/booklore:pr-${{ github.event.number }} should be manually cleaned from Docker Hub"

      - name: Comment Cleanup Complete
        uses: actions/github-script@v7
        with:
          script: |
            // Check if PR was merged or just closed
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const status = pr.data.merged ? '✅ PR merged and' : '🔴 PR closed and';
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status} **preview environment cleaned up.**\n\n` +
                    `- Containers stopped and removed\n` +
                    `- Volumes deleted\n` +
                    `- Deployment files removed`
            });

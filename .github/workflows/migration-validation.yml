name: Database Migration Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'booklore-api/src/main/resources/db/migration/**'
      - 'booklore-api/build.gradle'

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-migrations:
    name: Flyway Migration Validation
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: booklore
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -u root -prootpassword -e "SELECT 1" &> /dev/null; then
              echo "MariaDB is ready!"
              exit 0
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Validate Migrations
        working-directory: ./booklore-api
        run: |
          ./gradlew flywayMigrate --no-daemon \
            -Dflyway.url=jdbc:mariadb://localhost:3306/booklore \
            -Dflyway.user=root \
            -Dflyway.password=rootpassword
        env:
          DATABASE_URL: jdbc:mariadb://localhost:3306/booklore?createDatabaseIfNotExist=true
          DATABASE_USERNAME: root
          DATABASE_PASSWORD: rootpassword

      - name: Verify Schema
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword booklore -e "SHOW TABLES;"

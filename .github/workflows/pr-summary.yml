name: PR Final Summary

on:
  workflow_run:
    workflows:
      - "Build and Test BookLore"
      - "Test Coverage Report"
      - "Type Checking & Compilation"
      - "Security Scan"
    types: [completed]

concurrency:
  group: final-summary-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  checks: read
  contents: read
  actions: read

jobs:
  summary:
    name: 📊 PR Final Summary
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.13.1

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get PR Number (Fork-Safe)
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          
          # Try workflow_run.pull_requests first
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          
          # Fallback: Search PRs by head SHA (works for forks)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --state open --json number,headRefOid \
              | jq -r --arg sha "$HEAD_SHA" '.[] | select(.headRefOid == $sha) | .number' | head -1)
          fi
          
          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::No PR found for SHA $HEAD_SHA"
            exit 0
          fi
          
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "Found PR #$PR_NUMBER"

      - name: Check All Workflows Completed
        id: all-done
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ steps.pr.outputs.sha }}"
          
          # Required workflows (must all be done)
          REQUIRED=("Build and Test BookLore" "Test Coverage Report" "Type Checking & Compilation" "Security Scan")
          
          # Fetch all check runs for this SHA
          CHECKS=$(gh api "/repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" --jq '.check_runs')
          
          ALL_DONE="true"
          for WF in "${REQUIRED[@]}"; do
            # Check if any job from this workflow is still running/queued
            STATUS=$(echo "$CHECKS" | jq -r --arg wf "$WF" '
              [.[] | select(.name | test($wf; "i")) | .status] | 
              if any(. == "queued" or . == "in_progress") then "running" else "done" end
            ')
            echo "$WF: $STATUS"
            if [ "$STATUS" = "running" ]; then
              ALL_DONE="false"
            fi
          done
          
          echo "all_done=$ALL_DONE" >> $GITHUB_OUTPUT
          echo "All workflows done: $ALL_DONE"

      - name: Fetch Final Job Statuses
        if: steps.all-done.outputs.all_done == 'true' && steps.pr.outputs.number != ''
        id: checks
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const headSha = '${{ steps.pr.outputs.sha }}';
            
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha
            });
            
            const statusMap = {};
            const jobLinks = {};
            
            data.check_runs.forEach(run => {
              let icon = '⚪ Pending';
              if (run.status === 'in_progress') icon = '🔄 Running';
              else if (run.conclusion === 'success') icon = '✅ Pass';
              else if (run.conclusion === 'failure') icon = '❌ Fail';
              else if (run.conclusion === 'skipped') icon = '⏭️ Skip';
              else if (run.conclusion === 'cancelled') icon = '⏹️ Cancelled';
              
              statusMap[run.name] = icon;
              jobLinks[run.name] = run.html_url;
              core.info(`${run.name}: ${icon}`);
            });
            
            const getStatus = (patterns) => {
              for (const name of Object.keys(statusMap)) {
                if (patterns.some(p => name.toLowerCase().includes(p.toLowerCase()))) {
                  return { status: statusMap[name], link: jobLinks[name] || '' };
                }
              }
              return { status: '⚪ N/A', link: '' };
            };
            
            const statusData = {
              backend: getStatus(['backend tests']),
              frontend: getStatus(['frontend tests']),
              docker: getStatus(['docker', 'arm64']),
              typecheck: getStatus(['typescript', 'type check']),
              coverage: getStatus(['coverage']),
              codeql: getStatus(['codeql']),
              semgrep: getStatus(['semgrep']),
              gitleaks: getStatus(['gitleaks', 'secret'])
            };
            
            require('fs').writeFileSync('/tmp/check_statuses.json', JSON.stringify(statusData, null, 2));

      - name: Generate Summary
        if: steps.all-done.outputs.all_done == 'true' && steps.pr.outputs.number != ''
        id: summary
        run: |
          CHECKS=$(cat /tmp/check_statuses.json)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # Extract statuses
          BACKEND=$(echo "$CHECKS" | jq -r '.backend.status')
          BACKEND_LINK=$(echo "$CHECKS" | jq -r '.backend.link')
          FRONTEND=$(echo "$CHECKS" | jq -r '.frontend.status')
          FRONTEND_LINK=$(echo "$CHECKS" | jq -r '.frontend.link')
          TYPECHECK=$(echo "$CHECKS" | jq -r '.typecheck.status')
          TYPECHECK_LINK=$(echo "$CHECKS" | jq -r '.typecheck.link')
          DOCKER=$(echo "$CHECKS" | jq -r '.docker.status')
          DOCKER_LINK=$(echo "$CHECKS" | jq -r '.docker.link')
          COVERAGE=$(echo "$CHECKS" | jq -r '.coverage.status')
          COVERAGE_LINK=$(echo "$CHECKS" | jq -r '.coverage.link')
          CODEQL=$(echo "$CHECKS" | jq -r '.codeql.status')
          CODEQL_LINK=$(echo "$CHECKS" | jq -r '.codeql.link')
          SEMGREP=$(echo "$CHECKS" | jq -r '.semgrep.status')
          SEMGREP_LINK=$(echo "$CHECKS" | jq -r '.semgrep.link')
          GITLEAKS=$(echo "$CHECKS" | jq -r '.gitleaks.status')
          GITLEAKS_LINK=$(echo "$CHECKS" | jq -r '.gitleaks.link')
          
          cat > /tmp/pr_summary.md << EOF
          <!-- booklore-ci-pr-summary -->
          ## 📊 BookLore CI Summary
          
          ### 🧪 Tests & Build
          | Component | Status | Link |
          |-----------|--------|------|
          | Backend Tests (JDK21) | $BACKEND | [Logs]($BACKEND_LINK) |
          | Frontend Tests | $FRONTEND | [Logs]($FRONTEND_LINK) |
          | Type Checking (TS) | $TYPECHECK | [Logs]($TYPECHECK_LINK) |
          | Docker Build (ARM64) | $DOCKER | [Logs]($DOCKER_LINK) |
          | Test Coverage | $COVERAGE | [Logs]($COVERAGE_LINK) |
          
          ### 🔒 Security Checks
          | Check | Status | Link |
          |-------|--------|------|
          | CodeQL | $CODEQL | [Logs]($CODEQL_LINK) |
          | Semgrep | $SEMGREP | [Logs]($SEMGREP_LINK) |
          | Gitleaks | $GITLEAKS | [Logs]($GITLEAKS_LINK) |
          
          ### 📋 Quick Actions
          - 🚀 **Deploy Preview**: Comment \`/deploy\`
          - 📖 **Full CI**: [Actions](${{ github.server_url }}/${{ github.repository }}/actions)
          
          **Updated**: $TIMESTAMP ✅ *All checks complete*
          EOF
          
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/pr_summary.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Find Existing Comment
        if: steps.all-done.outputs.all_done == 'true' && steps.pr.outputs.number != ''
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- booklore-ci-pr-summary -->"

      - name: Post/Update Comment
        if: steps.all-done.outputs.all_done == 'true' && steps.pr.outputs.number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.summary.outputs.summary }}
          reactions: "rocket"

      - name: Skip (Not All Done)
        if: steps.all-done.outputs.all_done != 'true'
        run: echo "⏳ Waiting for other workflows to complete..."

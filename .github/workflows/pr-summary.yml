name: Live PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: live-summary-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  checks: read
  contents: read

jobs:
  summary:
    name: 📊 Live PR Summary
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Live Job Statuses
        id: checks
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            try {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha
              });
              
              const statusMap = {};
              const jobLinks = {};
              
              data.check_runs.forEach(run => {
                let icon = '⚪ Pending';
                if (run.status === 'in_progress') icon = '🔄 Running';
                else if (run.conclusion === 'success') icon = '✅ Pass';
                else if (run.conclusion === 'failure') icon = '❌ Fail';
                else if (run.conclusion === 'skipped') icon = '⏭️ Skip';
                else if (run.conclusion === 'cancelled') icon = '⏹️ Cancelled';
                else if (run.conclusion === 'neutral') icon = '⚠️ Neutral';
                
                statusMap[run.name] = icon;
                jobLinks[run.name] = run.html_url;
                core.info(`${run.name}: ${icon}`);
              });
              
              const getStatus = (patterns) => {
                for (const name of Object.keys(statusMap)) {
                  if (patterns.some(p => name.toLowerCase().includes(p.toLowerCase()))) {
                    return { status: statusMap[name], link: jobLinks[name] || '' };
                  }
                }
                return { status: '⚪ Pending', link: '' };
              };
              
              const statusData = {
                backend: getStatus(['backend tests']),
                frontend: getStatus(['frontend tests']),
                docker: getStatus(['docker', 'build', 'arm64']),
                typecheck: getStatus(['typescript', 'type check']),
                coverage: getStatus(['coverage']),
                codeql: getStatus(['codeql']),
                semgrep: getStatus(['semgrep']),
                gitleaks: getStatus(['gitleaks']),
                sonar: getStatus(['sonar', 'sonarcloud'])
              };
              
              require('fs').writeFileSync('/tmp/check_statuses.json', JSON.stringify(statusData));
              core.info('Live check statuses written to /tmp/check_statuses.json');
            } catch (error) {
              core.error(`Failed to fetch checks: ${error.message}`);
              const fallback = {
                backend: { status: '⚪ Pending', link: '' },
                frontend: { status: '⚪ Pending', link: '' },
                docker: { status: '⚪ Pending', link: '' },
                typecheck: { status: '⚪ Pending', link: '' },
                coverage: { status: '⚪ Pending', link: '' },
                codeql: { status: '⚪ Pending', link: '' },
                semgrep: { status: '⚪ Pending', link: '' },
                gitleaks: { status: '⚪ Pending', link: '' },
                sonar: { status: '⚪ Pending', link: '' }
              };
              require('fs').writeFileSync('/tmp/check_statuses.json', JSON.stringify(fallback));
            }

      - name: Debug check statuses
        run: |
          echo "=== Live Check Statuses JSON ==="
          cat /tmp/check_statuses.json | jq .
        continue-on-error: true

      - name: Parse check statuses
        id: status
        run: |
          if [ -f /tmp/check_statuses.json ]; then
            export CHECKS=$(cat /tmp/check_statuses.json)
            
            BACKEND_STATUS=$(echo "$CHECKS" | jq -r '.backend.status // "⚪ Pending"')
            BACKEND_LINK=$(echo "$CHECKS" | jq -r '.backend.link // ""')
            FRONTEND_STATUS=$(echo "$CHECKS" | jq -r '.frontend.status // "⚪ Pending"')
            FRONTEND_LINK=$(echo "$CHECKS" | jq -r '.frontend.link // ""')
            TYPECHECK_STATUS=$(echo "$CHECKS" | jq -r '.typecheck.status // "⚪ Pending"')
            TYPECHECK_LINK=$(echo "$CHECKS" | jq -r '.typecheck.link // ""')
            DOCKER_STATUS=$(echo "$CHECKS" | jq -r '.docker.status // "⚪ Pending"')
            DOCKER_LINK=$(echo "$CHECKS" | jq -r '.docker.link // ""')
            COVERAGE_STATUS=$(echo "$CHECKS" | jq -r '.coverage.status // "⚪ Pending"')
            COVERAGE_LINK=$(echo "$CHECKS" | jq -r '.coverage.link // ""')
            CODEQL_STATUS=$(echo "$CHECKS" | jq -r '.codeql.status // "⚪ Pending"')
            CODEQL_LINK=$(echo "$CHECKS" | jq -r '.codeql.link // ""')
            SEMGREP_STATUS=$(echo "$CHECKS" | jq -r '.semgrep.status // "⚪ Pending"')
            SEMGREP_LINK=$(echo "$CHECKS" | jq -r '.semgrep.link // ""')
            GITLEAKS_STATUS=$(echo "$CHECKS" | jq -r '.gitleaks.status // "⚪ Pending"')
            GITLEAKS_LINK=$(echo "$CHECKS" | jq -r '.gitleaks.link // ""')
            SONAR_STATUS=$(echo "$CHECKS" | jq -r '.sonar.status // "⚪ Pending"')
            SONAR_LINK=$(echo "$CHECKS" | jq -r '.sonar.link // ""')
          else
            BACKEND_STATUS="⚪ Pending"
            BACKEND_LINK=""
            FRONTEND_STATUS="⚪ Pending"
            FRONTEND_LINK=""
            TYPECHECK_STATUS="⚪ Pending"
            TYPECHECK_LINK=""
            DOCKER_STATUS="⚪ Pending"
            DOCKER_LINK=""
            COVERAGE_STATUS="⚪ Pending"
            COVERAGE_LINK=""
            CODEQL_STATUS="⚪ Pending"
            CODEQL_LINK=""
            SEMGREP_STATUS="⚪ Pending"
            SEMGREP_LINK=""
            GITLEAKS_STATUS="⚪ Pending"
            GITLEAKS_LINK=""
            SONAR_STATUS="⚪ Pending"
            SONAR_LINK=""
          fi
          
          echo "backend_status=$BACKEND_STATUS" >> $GITHUB_OUTPUT
          echo "backend_link=$BACKEND_LINK" >> $GITHUB_OUTPUT
          echo "frontend_status=$FRONTEND_STATUS" >> $GITHUB_OUTPUT
          echo "frontend_link=$FRONTEND_LINK" >> $GITHUB_OUTPUT
          echo "typecheck_status=$TYPECHECK_STATUS" >> $GITHUB_OUTPUT
          echo "typecheck_link=$TYPECHECK_LINK" >> $GITHUB_OUTPUT
          echo "docker_status=$DOCKER_STATUS" >> $GITHUB_OUTPUT
          echo "docker_link=$DOCKER_LINK" >> $GITHUB_OUTPUT
          echo "coverage_status=$COVERAGE_STATUS" >> $GITHUB_OUTPUT
          echo "coverage_link=$COVERAGE_LINK" >> $GITHUB_OUTPUT
          echo "codeql_status=$CODEQL_STATUS" >> $GITHUB_OUTPUT
          echo "codeql_link=$CODEQL_LINK" >> $GITHUB_OUTPUT
          echo "semgrep_status=$SEMGREP_STATUS" >> $GITHUB_OUTPUT
          echo "semgrep_link=$SEMGREP_LINK" >> $GITHUB_OUTPUT
          echo "gitleaks_status=$GITLEAKS_STATUS" >> $GITHUB_OUTPUT
          echo "gitleaks_link=$GITLEAKS_LINK" >> $GITHUB_OUTPUT
          echo "sonar_status=$SONAR_STATUS" >> $GITHUB_OUTPUT
          echo "sonar_link=$SONAR_LINK" >> $GITHUB_OUTPUT

      - name: Debug parsed statuses
        run: |
          echo "=== Parsed Live Statuses ==="
          echo "BACKEND_STATUS=$BACKEND_STATUS"
          echo "FRONTEND_STATUS=$FRONTEND_STATUS"
          echo "SONAR_STATUS=$SONAR_STATUS"
        continue-on-error: true

      - name: Generate Live PR Summary
        id: summary
        env:
          BACKEND_STATUS: ${{ steps.status.outputs.backend_status }}
          BACKEND_LINK: ${{ steps.status.outputs.backend_link }}
          FRONTEND_STATUS: ${{ steps.status.outputs.frontend_status }}
          FRONTEND_LINK: ${{ steps.status.outputs.frontend_link }}
          TYPECHECK_STATUS: ${{ steps.status.outputs.typecheck_status }}
          TYPECHECK_LINK: ${{ steps.status.outputs.typecheck_link }}
          DOCKER_STATUS: ${{ steps.status.outputs.docker_status }}
          DOCKER_LINK: ${{ steps.status.outputs.docker_link }}
          COVERAGE_STATUS: ${{ steps.status.outputs.coverage_status }}
          COVERAGE_LINK: ${{ steps.status.outputs.coverage_link }}
          CODEQL_STATUS: ${{ steps.status.outputs.codeql_status }}
          CODEQL_LINK: ${{ steps.status.outputs.codeql_link }}
          SEMGREP_STATUS: ${{ steps.status.outputs.semgrep_status }}
          SEMGREP_LINK: ${{ steps.status.outputs.semgrep_link }}
          GITLEAKS_STATUS: ${{ steps.status.outputs.gitleaks_status }}
          GITLEAKS_LINK: ${{ steps.status.outputs.gitleaks_link }}
          SONAR_STATUS: ${{ steps.status.outputs.sonar_status }}
          SONAR_LINK: ${{ steps.status.outputs.sonar_link }}
        run: |
          # Coverage not available in live mode (no artifacts)
          COVERAGE_BACKEND="N/A"
          COVERAGE_FRONTEND="N/A"
          
          # Get current timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # Generate live summary markdown
          cat > /tmp/pr_summary.md << EOF
          <!-- booklore-ci-pr-summary -->
          ## 📊 BookLore Live CI Summary
          
          ### 🧪 Tests & Build
          | Component | Status | Coverage | Link |
          |-----------|--------|----------|------|
          | Backend Tests (JDK21) | ${BACKEND_STATUS} | ${COVERAGE_BACKEND} | [Logs](${BACKEND_LINK}) |
          | Frontend Tests | ${FRONTEND_STATUS} | ${COVERAGE_FRONTEND} | [Logs](${FRONTEND_LINK}) |
          | Type Checking (TS) | ${TYPECHECK_STATUS} | - | [Logs](${TYPECHECK_LINK}) |
          | Docker Build (ARM64) | ${DOCKER_STATUS} | - | [Logs](${DOCKER_LINK}) |
          | Test Coverage | ${COVERAGE_STATUS} | - | [Logs](${COVERAGE_LINK}) |
          
          ### 🔒 Security Checks
          | Check | Status | Link |
          |-------|--------|------|
          | CodeQL | ${CODEQL_STATUS} | [Logs](${CODEQL_LINK}) |
          | Semgrep | ${SEMGREP_STATUS} | [Logs](${SEMGREP_LINK}) |
          | Gitleaks | ${GITLEAKS_STATUS} | [Logs](${GITLEAKS_LINK}) |
          | SonarCloud | ${SONAR_STATUS} | [Logs](${SONAR_LINK}) |
          
          ### 🏷️ PR Labels
          - Size: Auto-assigned by \`CodelyTV/pr-size-labeler\`
          - Type: Based on conventional commit prefixes
          - Domain: Detected from file changes (backend/frontend/infra)
          
          ### 📋 Quick Actions
          - 🚀 **Deploy Preview**: Comment \`/deploy\` to trigger deployment
          - 📖 **View Full CI**: [Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - 📦 **Artifacts**: Available after jobs complete (7-day retention)
          
          **Last updated**: ${TIMESTAMP} *(Updates live as jobs finish)*
          EOF
          
          # Output summary
          SUMMARY=$(cat /tmp/pr_summary.md)
          echo "summary<<EOSUMMARY" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOSUMMARY" >> $GITHUB_OUTPUT

      - name: Find existing comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- booklore-ci-pr-summary -->"

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.summary.outputs.summary }}
          reactions: "eyes"

      - name: Add summary to job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📊 BookLore Live CI Summary
          
          ✅ Live PR summary comment posted successfully
          
          - **PR Number**: ${{ github.event.number }}
          - **Run ID**: ${{ github.run_id }}
          EOF

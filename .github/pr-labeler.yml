# PR Title Labeler configuration for BookLore
# Labels PRs based on conventional commit prefixes in PR title

version: 1

labels:
  # ===========================================
  # Conventional Commit Type Labels
  # ===========================================
  - label: "bugfix"
    title: '^fix(\([^)]*\))?:|^fix:.*'

  - label: "enhancement"
    title: '^feat(\([^)]*\))?:|^feat:.*'

  - label: "build"
    title: '^build(\([^)]*\))?:|^build:.*'

  - label: "chore"
    title: '^chore(\([^)]*\))?:|^chore:.*'

  - label: "ci"
    title: '^ci(\([^)]*\))?:|^ci:.*'

  - label: "ci"
    title: '^.*\(ci\):.*'

  - label: "performance"
    title: '^perf(\([^)]*\))?:|^perf:.*'

  - label: "refactor"
    title: '^refactor(\([^)]*\))?:|^refactor:.*'

  - label: "revert"
    title: '^revert(\([^)]*\))?:|^revert:.*'

  - label: "style"
    title: '^style(\([^)]*\))?:|^style:.*'

  - label: "documentation"
    title: '^docs(\([^)]*\))?:|^docs:.*'

  - label: "documentation"
    title: '^.*\(docs\):.*'

  - label: "dependencies"
    title: '^deps(\([^)]*\))?:|^deps:.*'

  - label: "dependencies"
    title: '^.*\(deps\):.*'

  - label: "tests"
    title: '^test(\([^)]*\))?:|^test:.*'

  # ===========================================
  # Scope-based Labels
  # ===========================================
  - label: "api"
    title: '.*\(api\):.*|.*openapi.*|.*swagger.*'

  - label: "backend"
    title: '.*\(backend\):.*|.*\(api\):.*'

  - label: "frontend"
    title: '.*\(frontend\):.*|.*\(ui\):.*'

  - label: "docker"
    title: '.*\(docker\):.*|.*dockerfile.*'

  - label: "database"
    title: '.*\(db\):.*|.*\(database\):.*|.*migration.*'

  - label: "security"
    title: '.*\(security\):.*|.*\(auth\):.*'

  # ===========================================
  # Feature-specific Labels
  # ===========================================
  - label: "kobo"
    title: '.*kobo.*'

  - label: "opds"
    title: '.*opds.*'

  - label: "reader"
    title: '.*reader.*|.*epub.*|.*pdf.*|.*cbr.*'

  - label: "metadata"
    title: '.*metadata.*|.*goodreads.*|.*amazon.*'

  # ===========================================
  # Branch-based Labels
  # ===========================================
  - label: "release"
    base-branch: 'main'

{{- $secretName := printf "%s-mariadb-password" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if $existing }}
  mariadb-password: {{ index $existing.data "mariadb-password" }}
  mariadb-root-password: {{ index $existing.data "mariadb-root-password" }}
  {{- else }}
  mariadb-password: {{ randAlphaNum 32 | b64enc }}
  mariadb-root-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}

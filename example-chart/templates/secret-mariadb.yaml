{{- $secretName := (printf "%s-mariadb-password" .Release.Name) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  mariadb-password: {{ randAlphaNum 32 | b64enc }}
  mariadb-root-password: {{ randAlphaNum 32 | b64enc }}
{{- end }}

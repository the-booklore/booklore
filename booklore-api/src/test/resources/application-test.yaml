booklore:
  security:
    oidc:
      jwks:
        connect-timeout: 500ms
        read-timeout: 500ms
        cache-ttl: 1s
        cache-refresh: 500ms
      jwt:
        clock-skew: 60s
        # For testing, we might want to be less strict or test specific algorithms.
        # A broader set or even leaving it empty (to rely on discovery) might be suitable.
        allowed-algorithms: "RS256,ES256"

<div class="login-container">
  <div class="login-card-wrapper">
    <div class="login-card-border">
      <div class="login-card">
        <div class="login-header">
          <div class="logo-wrapper">
            <svg
			  class="logo-icon"
			  viewBox="0 0 126 126"
			  xmlns="http://www.w3.org/2000/svg"
			  aria-hidden="true"
			  focusable="false"
			>
			  <path
			    d="M102.13,3.17c0-1.75-1.42-3.17-3.17-3.17H26.92C16.49,0,7.96,8.13,7.96,18.06v89.87c0,9.94,8.53,18.06,18.96,18.06h72.17c10.43,0,18.96-8.13,18.96-18.06V24.57c0-1.75-1.42-3.17-3.17-3.17h-41.41c-4.25,0-7.7,3.45-7.7,7.7v26.67c0,1.39-1.67,2.11-2.68,1.15l-10.79-10.28c-.61-.58-1.57-.58-2.19,0l-10.79,10.28c-1.01.96-2.68.25-2.68-1.15V21.4h-8.29c-5.96,0-10.83-3.39-10.83-7.53s4.87-7.53,10.83-7.53h70.6c1.75,0,3.17-1.42,3.17-3.17h.01Z"
				fill="var(--primary-color)"
		      />
			  <path
			    d="M60.18,15.13v29.96l-5.01-3-.23-.13c-2.36-1.29-5.46-1.25-7.77.13l-5.01,3V15.14"
				fill="white"
			  />
			  <rect
                x="23.99"
				y="10.13"
				width="74.63"
				height="6.69"
				rx="3.34"
				ry="3.34"
				fill="white"
			  />
			</svg>
		  </div>
          <h1 class="login-title">Welcome Back</h1>
          <p class="login-subtitle">Sign in to continue your journey</p>
        </div>

        @if (showOidcBypassInfo) {
          <div class="oidc-warning">
            <div class="warning-content">
              <div class="warning-header">
                <i class="pi pi-exclamation-triangle"></i>
                <span>OIDC Authentication Issues</span>
              </div>
              <p class="warning-message">{{ oidcBypassMessage }}</p>
              <div class="warning-actions">
                <p-button
                  size="small"
                  severity="warn"
                  label="Retry OIDC"
                  icon="pi pi-refresh"
                  (click)="retryOidc()"
                />
                <p-button
                  size="small"
                  severity="success"
                  label="Use Local Login"
                  icon="pi pi-times"
                  (click)="dismissOidcWarning()"
                />
              </div>
            </div>
          </div>
        }

        <form class="login-form" #loginForm="ngForm" (ngSubmit)="login()">
          <div class="form-field">
            <label for="username" class="form-label">
              <i class="pi pi-user"></i>
              <span>Username</span>
            </label>
            <input
              fluid
              pInputText
              id="username"
              name="username"
              required
              [(ngModel)]="username"
              placeholder="Enter your username"
              class="form-input"
              autocomplete="username"
            />
          </div>

          <div class="form-field">
            <label for="password" class="form-label">
              <i class="pi pi-lock"></i>
              <span>Password</span>
            </label>
            <p-password
              id="password"
              name="password"
              required
              [(ngModel)]="password"
              [feedback]="false"
              placeholder="Enter your password"
              [toggleMask]="true"
              [fluid]="true"
              autocomplete="current-password"
            ></p-password>
          </div>

          <p-button
            fluid
            type="submit"
            label="Sign In"
            icon="pi pi-sign-in"
            [disabled]="!loginForm.valid || !username || !password"
            class="login-button">
          </p-button>

          @if (errorMessage) {
            <div class="error-message">
              <p-message severity="error">{{ errorMessage }}</p-message>
            </div>
          }

          @if (oidcEnabled && !isOidcBypassed) {
            <div class="divider">
              <span>or continue with</span>
            </div>

            <p-button
              fluid
              severity="secondary"
              [label]="isOidcLoginInProgress ? 'Redirecting to ' + oidcName + '...' : oidcName"
              [icon]="isOidcLoginInProgress ? 'pi pi-spin pi-spinner' : 'pi pi-id-card'"
              [disabled]="isOidcLoginInProgress"
              (click)="loginWithOidc()"
              class="oidc-button"/>

            <div class="help-text">
              <button
                type="button"
                class="text-link"
                (click)="bypassOidc()">
                Having trouble with {{ oidcName }}? Use local login
              </button>
            </div>
          }

          @if (oidcEnabled && isOidcBypassed) {
            <div class="help-text">
              <button
                type="button"
                class="text-link primary"
                (click)="enableOidc()">
                Re-enable {{ oidcName }} login
              </button>
            </div>
          }
        </form>
      </div>
    </div>
  </div>
</div>

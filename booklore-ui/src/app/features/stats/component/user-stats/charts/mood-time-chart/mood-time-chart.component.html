<ng-container *transloco="let t; prefix: 'statsUser.moodTime'">
<div class="mood-time-container">
  <div class="chart-header">
    <div class="chart-title">
      <h3>
        <i class="pi pi-heart mood-time-icon"></i>
        {{ t('title') }}
        <i class="pi pi-question-circle chart-info-icon"
           [pTooltip]="t('tooltip')"
           tooltipPosition="bottom"
           tooltipStyleClass="chart-info-tooltip"
           [appendTo]="'body'"></i>
      </h3>
      <p class="chart-description">{{ t('description') }}</p>
    </div>
    <div class="year-nav">
      <button class="nav-btn" (click)="changeYear(-1)"><i class="pi pi-chevron-left"></i></button>
      <span class="year-label">{{ currentYear }}</span>
      <button class="nav-btn" (click)="changeYear(1)"><i class="pi pi-chevron-right"></i></button>
    </div>
  </div>
  @if (hasData) {
    <div class="stats-row">
      <div class="stat-card moods">
        <span class="stat-value">{{ moodCount }}</span>
        <span class="stat-label">{{ t('moods') }}</span>
      </div>
      <div class="stat-card top">
        <span class="stat-value">{{ topMood }}</span>
        <span class="stat-label">{{ t('topMood') }}</span>
      </div>
      <div class="stat-card peak">
        <span class="stat-value">{{ peakHour }}</span>
        <span class="stat-label">{{ t('peakHour') }}</span>
      </div>
    </div>
    <div class="chart-wrapper">
      <canvas baseChart [data]="chartData" [options]="chartOptions" [type]="chartType"></canvas>
    </div>
  } @else {
    <div class="no-data-message">
      <i class="pi pi-info-circle"></i>
      <p>{{ t('noData') }}</p>
      <small>{{ t('noDataHint') }}</small>
    </div>
  }
</div>
</ng-container>

<ng-container *transloco="let t; prefix: 'statsUser.formatChord'">
<div class="format-chord-container">
  <div class="chart-header">
    <div class="chart-title">
      <h3>
        <i class="pi pi-link format-chord-icon"></i>
        {{ t('title') }}
        <i class="pi pi-question-circle chart-info-icon"
           [pTooltip]="t('tooltip')"
           tooltipPosition="bottom"
           tooltipStyleClass="chart-info-tooltip"
           [appendTo]="'body'"></i>
      </h3>
      <p class="chart-description">{{ t('description') }}</p>
    </div>
  </div>

  @if (hasData) {
    <div class="stats-row">
      <div class="stat-card formats">
        <span class="stat-value">{{ formatCount }}</span>
        <span class="stat-label">{{ t('formats') }}</span>
      </div>
      <div class="stat-card links">
        <span class="stat-value">{{ connectionCount }}</span>
        <span class="stat-label">{{ t('connections') }}</span>
      </div>
      <div class="stat-card most">
        <span class="stat-value">{{ mostConnected }}</span>
        <span class="stat-label">{{ t('mostConnected') }}</span>
      </div>
    </div>
    <div class="canvas-wrapper">
      <canvas #chordCanvas></canvas>
    </div>
  } @else {
    <div class="no-data-message">
      <i class="pi pi-info-circle"></i>
      <p>{{ t('noData') }}</p>
      <small>{{ t('noDataHint') }}</small>
    </div>
  }
</div>
</ng-container>

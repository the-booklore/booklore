<div class="reading-seasons-container">
  <div class="chart-header">
    <div class="chart-title">
      <h3>
        <i class="pi pi-sun reading-seasons-icon"></i>
        Reading Seasons
      </h3>
      <p class="chart-description">Genre distribution by month throughout the year</p>
    </div>
    <div class="year-controls">
      @if (!showAllTime) {
        <div class="year-selector">
          <button type="button" class="year-nav-btn" (click)="changeYear(-1)" title="Previous year">
            <i class="pi pi-chevron-left"></i>
          </button>
          <span class="current-year">{{ currentYear }}</span>
          <button type="button" class="year-nav-btn" (click)="changeYear(1)" title="Next year">
            <i class="pi pi-chevron-right"></i>
          </button>
        </div>
      }
      <button type="button" class="all-time-btn" [class.active]="showAllTime" (click)="toggleAllTime()">
        {{ showAllTime ? 'Show Year' : 'All Time' }}
      </button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-item">
      <span class="stat-value">{{ stats.diverseMonth }}</span>
      <span class="stat-label">Most Diverse Month</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">{{ stats.focusedMonth }}</span>
      <span class="stat-label">Most Focused Month</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">{{ stats.seasonalInsight }}</span>
      <span class="stat-label">Seasonal Insight</span>
    </div>
  </div>

  <div class="chart-wrapper">
    <canvas baseChart
            [data]="(chartData$ | async) ?? {labels: [], datasets: []}"
            [options]="chartOptions"
            [type]="chartType">
    </canvas>
  </div>
</div>

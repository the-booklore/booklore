<ng-container *transloco="let t; prefix: 'statsUser.readingRhythm'">
<div class="reading-rhythm-container">
  <div class="chart-header">
    <div class="chart-title">
      <h3>
        <i class="pi pi-sync reading-rhythm-icon"></i>
        {{ t('title') }}
        <i class="pi pi-question-circle chart-info-icon"
           [pTooltip]="t('tooltip')"
           tooltipPosition="bottom"
           tooltipStyleClass="chart-info-tooltip"
           [appendTo]="'body'"></i>
      </h3>
      <p class="chart-description">{{ t('description') }}</p>
    </div>
    <div class="year-nav">
      <button class="nav-btn" (click)="changeYear(-1)"><i class="pi pi-chevron-left"></i></button>
      <span class="year-label">{{ currentYear }}</span>
      <button class="nav-btn" (click)="changeYear(1)"><i class="pi pi-chevron-right"></i></button>
    </div>
  </div>

  @if (hasData) {
    <div class="stats-row">
      <div class="stat-card sessions">
        <span class="stat-value">{{ totalSessions }}</span>
        <span class="stat-label">{{ t('sessions') }}</span>
      </div>
      <div class="stat-card busiest">
        <span class="stat-value">{{ busiestMonth }}</span>
        <span class="stat-label">{{ t('busiestMonth') }}</span>
      </div>
      <div class="stat-card genre">
        <span class="stat-value">{{ topGenre }}</span>
        <span class="stat-label">{{ t('topGenre') }}</span>
      </div>
    </div>
    <div class="canvas-wrapper">
      <canvas #rhythmCanvas></canvas>
    </div>
  } @else {
    <div class="no-data-message">
      <i class="pi pi-info-circle"></i>
      <p>{{ t('noData') }}</p>
      <small>{{ t('noDataHint') }}</small>
    </div>
  }
</div>
</ng-container>

<ng-container *transloco="let t; prefix: 'dashboard.settings'">
  <div class="dashboard-settings">
    <div class="panel-header">
      <div class="header-icon-wrapper">
        <i class="pi pi-sliders-h header-icon"></i>
      </div>
      <div class="header-text">
        <h2 class="panel-title">{{ t('title') }}</h2>
        <p class="panel-description">{{ t('description', { maxScrollers: MAX_SCROLLERS }) }}</p>
      </div>
      <p-button
        icon="pi pi-times"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        (onClick)="cancel()"
        class="close-button"
      />
    </div>

    <div class="scrollers-container">
      @for (scroller of config.scrollers; track scroller.id; let i = $index) {
        <div class="scroller-item">
          <div class="scroller-content">
            <div class="scroller-controls-left">
              <p-checkbox [(ngModel)]="scroller.enabled" [binary]="true"></p-checkbox>
            </div>

            <div class="scroller-fields">
              <div class="scroller-field" [class.expanded]="scroller.type !== 'magicShelf'">
                <label>{{ t('type') }}</label>
                <p-select
                  fluid
                  [options]="availableScrollerTypes"
                  [(ngModel)]="scroller.type"
                  (onChange)="onScrollerTypeChange(scroller)"
                  [placeholder]="t('selectType')"
                  appendTo="body">
                </p-select>
              </div>

              @if (scroller.type === 'magicShelf') {
                <div class="scroller-field">
                  <label>{{ t('magicShelf') }}</label>
                  <p-select
                    fluid
                    [options]="(magicShelves$ | async)!"
                    [(ngModel)]="scroller.magicShelfId"
                    [placeholder]="t('selectMagicShelf')"
                    appendTo="body">
                  </p-select>
                </div>

                <div class="scroller-field">
                  <label>Direction</label>
                  <p-select
                    fluid
                    [options]="sortDirectionOptions"
                    [(ngModel)]="scroller.sortDirection"
                    placeholder="Select direction"
                    appendTo="body">
                  </p-select>
                </div>
              }

            @if (scroller.type === 'upNext') {
              <div class="scroller-field">
                <label>Book Selection</label>
                <p-select
                  fluid
                  [options]="upNextModeOptions"
                  [(ngModel)]="scroller.upNextShowFirstUnread"
                  placeholder="Select mode"
                  appendTo="body">
                </p-select>
              </div>
            }

            @if (scroller.type === 'readAgain') {
              <div class="scroller-field">
                <label>Sort Order</label>
                <p-select
                  fluid
                  [options]="readAgainSortOptions"
                  [(ngModel)]="scroller.readAgainSortByFinished"
                  placeholder="Select sorting"
                  appendTo="body">
                </p-select>
              </div>
            }

              <div class="scroller-field max-items-field">
                <label>{{ t('maxItems') }}</label>
                <p-inputNumber
                  fluid
                  [(ngModel)]="scroller.maxItems"
                  [min]="MIN_ITEMS"
                  [max]="MAX_ITEMS"
                  [showButtons]="true">
                </p-inputNumber>
              </div>
            </div>

            <div class="scroller-controls-right">
              <p-button
                icon="pi pi-arrow-up"
                outlined
                rounded
                severity="info"
                size="small"
                [disabled]="i === 0"
                (click)="moveUp(i)">
              </p-button>
              <p-button
                icon="pi pi-arrow-down"
                outlined
                rounded
                severity="info"
                size="small"
                [disabled]="i === config.scrollers.length - 1"
                (click)="moveDown(i)">
              </p-button>
              <p-button
                icon="pi pi-trash"
                outlined
                rounded
                size="small"
                severity="danger"
                (click)="removeScroller(i)"
                [disabled]="config.scrollers.length === 1">
              </p-button>
            </div>
          </div>
        </div>
      }
    </div>

    <div class="dialog-footer">
      <div class="footer-left">
        <p-button
          label="Add Scroller"
          icon="pi pi-plus"
          severity="primary"
          (click)="addScroller()"
          [disabled]="config.scrollers.length >= MAX_SCROLLERS">
        </p-button>
        <p-button
          label="Reset to Default"
          icon="pi pi-refresh"
          severity="secondary"
          text
          (click)="resetToDefault()">
        </p-button>
      </div>
      <div class="footer-actions">
        <p-button
          label="Cancel"
          [outlined]="true"
          severity="secondary"
          (click)="cancel()">
        </p-button>
        <p-button
          label="Save"
          icon="pi pi-check"
          severity="success"
          (click)="save()">
        </p-button>
      </div>
    </div>
  </div>
</ng-container>

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - when: never

stages:
  - build
  - test
  - package-build
  - package-test
  - publish
  - mirror

default:
  tags:
    - universal

variables:
  # Use a CI-specific Dockerfile (recommended with buildah: fully-qualified FROM images, npm install, etc.)
  DOCKER_FILE: "Dockerfile.ci"

# =========================================================
# Includes
# - semantic-release: ONLY on main branch push pipelines (optional)
# - docker component: ONLY on merge request pipelines
# =========================================================
include:
  - component: "$CI_SERVER_FQDN/to-be-continuous/semantic-release/gitlab-ci-semrel@4.0"
    rules:
      - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    inputs:
      changelog-enabled: true
      auto-release-enabled: true

  - component: "$CI_SERVER_FQDN/to-be-continuous/docker/gitlab-ci-docker@8.0"
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      - if: '$CI_COMMIT_TAG'
    inputs:
      trivy-disabled: true
      hadolint-disabled: true
      prod-publish-strategy: "none"

      # Build params
      build-args: >-
        --platform linux/amd64,linux/arm64
        --build-arg APP_VERSION=mr-${CI_MERGE_REQUEST_IID}
        --build-arg APP_REVISION=$CI_COMMIT_SHA

      push-args: "--compression-format zstd --compression-level 20"

      # Tag the MR image uniquely per MR + commit
      snapshot-image: "$CI_REGISTRY_IMAGE/mr:${CI_MERGE_REQUEST_IID}-${CI_COMMIT_SHORT_SHA}"

# =========================================================
# BACKEND TESTS (Java 25 + Gradle)
# - runs on branch pushes and MR pipelines
# - does NOT run on schedules
# =========================================================
backend_tests:
  stage: test
  image: eclipse-temurin:25-jdk
  script:
    - cd booklore-api
    - ./gradlew test --no-daemon --parallel
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success

# =========================================================
# FRONTEND TESTS (Node 22 + Angular)
# - runs on branch pushes and MR pipelines
# - does NOT run on schedules
# =========================================================
frontend_tests:
  stage: test
  image: node:22
  script:
    - cd booklore-ui
    - npm install --force --legacy-peer-deps
    - npx ng test --watch=false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success

# =========================================================
# Docker component jobs: force them to:
# - run ONLY for merge requests
# - wait for tests
#
# IMPORTANT:
# If your docker component uses different job names, adjust them.
# Open the pipeline graph once and copy the docker job names here.
# =========================================================
docker-build:
  stage: package-build
  needs:
    - job: backend_tests
      optional: true
    - job: frontend_tests
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        DOCKER_SNAPSHOT_IMAGE: "$CI_REGISTRY_IMAGE/mr:${CI_MERGE_REQUEST_IID}-${CI_COMMIT_SHORT_SHA}"
      when: on_success
    - if: '$CI_COMMIT_TAG'
      variables:
        DOCKER_SNAPSHOT_IMAGE: "$CI_REGISTRY_IMAGE:${CI_COMMIT_TAG}"  
      when: on_success
    - when: never



# =========================================================
# MIRROR JOB — ONLY SYNC DEVELOP (scheduled pipelines only)
# =========================================================
mirror_from_github:
  stage: mirror
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache git
  script:
    - git clone --branch develop --single-branch https://github.com/booklore-app/booklore.git source
    - cd source
    - git remote add gitlab https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.theprivateserver.de/WorldTeacher/wt-booklore.git
    - git push --force gitlab develop
    - git push --force gitlab --tags

# Docker jobs should run on your buildah runner
.docker-base:
  tags:
    - buildah

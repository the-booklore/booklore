mirror_from_github:
  stage: mirror
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  before_script:
    - apk add --no-cache git
  script:
    # Clone only what we need
    - git clone --branch develop --single-branch https://github.com/booklore-app/booklore.git source
    - cd source

    # Add GitLab remote
    - git remote add gitlab https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.theprivateserver.de/WorldTeacher/wt-booklore.git

    # Push develop -> main (force to keep it in sync)
    - git push --force gitlab develop:main

    # Push tags
    - git push --force gitlab --tags


stages:
  - build
  - test
  - deploy
  - mirror

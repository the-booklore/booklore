stages:
  - build
  - test
  - package-build
  - package-test
  - publish
  - mirror

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: "$CI_COMMIT_TAG"
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - when: never

include:
  # semantic-release only on main push (never on schedule/MR/tag)
  - component: "$CI_SERVER_FQDN/to-be-continuous/semantic-release/gitlab-ci-semrel@4.0"
    rules:
      - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
        when: always
      - when: never
    inputs:
      changelog-enabled: true
      auto-release-enabled: false

  # docker component only on MR pipelines + tag pipelines (never on schedule, never on normal pushes)
  - component: "$CI_SERVER_FQDN/to-be-continuous/docker/gitlab-ci-docker@8.0"
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        when: always
      - if: "$CI_COMMIT_TAG"
        when: always
      - when: never
    inputs:
      trivy-disabled: true
      hadolint-disabled: true
      prod-publish-strategy: "none"
      push-args: "--compression-format zstd --compression-level 20"
      snapshot-image: "$CI_REGISTRY_IMAGE/snapshot:$CI_COMMIT_REF_SLUG"
      release-extra-tags: "latest \\g<major>.\\g<minor>\\g<build> \\g<major>\\g<build>"

# -----------------------------
# Tests (branch pushes + MRs)
# -----------------------------
backend_tests:
  stage: test
  image: eclipse-temurin:25-jdk
  tags: [universal]
  script:
    - cd booklore-api
    - ./gradlew test --no-daemon --parallel
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
      when: never
    - when: on_success

frontend_tests:
  stage: test
  image: node:22
  tags: [universal]
  script:
    - cd booklore-ui
    - npm install --force --legacy-peer-deps
    - npx ng test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
      when: never
    - when: on_success

# -----------------------------
# Mirror (schedule only)
# -----------------------------
mirror_from_github:
  stage: mirror
  image: alpine:latest
  tags: [universal]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - when: never

  variables:
    UPSTREAM_BRANCH: "upstream/develop"
    SOURCE_BRANCH: "upstream/develop"
    TARGET_BRANCH: "develop"

  before_script:
    - apk add --no-cache git curl jq

  script:
    # 1) Mirror GitHub develop -> GitLab upstream/develop
    - git clone --branch develop --single-branch https://github.com/booklore-app/booklore.git source
    - cd source
    - git remote add gitlab https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.theprivateserver.de/WorldTeacher/wt-booklore.git
    - git push --force gitlab develop:refs/heads/${UPSTREAM_BRANCH}
    - git push --force gitlab --tags

    # 2) Only create/keep MR if upstream/develop is ahead of develop
    - |
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "ERROR: GITLAB_TOKEN is not set. Create a Project Access Token with api scope and set CI/CD variable GITLAB_TOKEN."
        exit 1
      fi

      # Compare target -> source (is source ahead?)
      COMPARE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/compare"
      COMPARE_JSON="$(curl -sf \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --get "${COMPARE_URL}" \
        --data-urlencode "from=${TARGET_BRANCH}" \
        --data-urlencode "to=${SOURCE_BRANCH}")"

      AHEAD_COMMITS="$(echo "$COMPARE_JSON" | jq -r '.commits | length')"
      echo "Compare ${TARGET_BRANCH}..${SOURCE_BRANCH}: commits ahead = ${AHEAD_COMMITS}"

      MR_LIST_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=opened&source_branch=${SOURCE_BRANCH}&target_branch=${TARGET_BRANCH}"
      EXISTING_IID="$(curl -sf --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" "${MR_LIST_URL}" | jq -r '.[0].iid // empty')"

      if [ "${AHEAD_COMMITS}" = "0" ]; then
        echo "No upstream changes to merge."

        # Optional: close an existing sync MR if it exists (keeps things tidy)
        if [ -n "${EXISTING_IID}" ]; then
          echo "Closing existing sync MR IID ${EXISTING_IID} (nothing to merge)."
          curl -sf -X PUT \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --data "state_event=close" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${EXISTING_IID}" \
          || true
        fi

        exit 0
      fi

      # 3) Create or reuse MR upstream/develop -> develop
      if [ -n "${EXISTING_IID}" ]; then
        echo "Found existing MR IID: ${EXISTING_IID}"
        MR_IID="${EXISTING_IID}"
      else
        echo "Creating MR ${SOURCE_BRANCH} -> ${TARGET_BRANCH}"
        CREATE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
        MR_IID="$(curl -sf -X POST \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$(jq -n \
            --arg sb "${SOURCE_BRANCH}" \
            --arg tb "${TARGET_BRANCH}" \
            --arg title "Sync upstream: ${SOURCE_BRANCH} → ${TARGET_BRANCH}" \
            --arg desc "Automated mirror from GitHub develop into ${SOURCE_BRANCH}. This MR keeps ${TARGET_BRANCH} up to date." \
            '{source_branch:$sb,target_branch:$tb,title:$title,description:$desc,remove_source_branch:false,squash:false}')" \
          "${CREATE_URL}" | jq -r '.iid')"
        echo "Created MR IID: ${MR_IID}"
      fi

      # 4) Enable auto-merge when pipeline succeeds
      echo "Enabling auto-merge for MR IID: ${MR_IID}"
      MERGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}/merge"
      curl -sf -X PUT \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --data "merge_when_pipeline_succeeds=true" \
        --data "should_remove_source_branch=false" \
        "${MERGE_URL}" \
      || echo "Could not enable auto-merge (may require approvals, be unmergeable, have conflicts, or have no MR pipeline)."

# -----------------------------
# to-be-continuous overrides
# -----------------------------

.semrel-base:
  tags: [universal]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  variables:
    SEMREL_BRANCHES_REF: "^main$"

# Docker jobs should run ONLY in MR pipelines and tag pipelines.
# Also: no more "push && CI_OPEN_MERGE_REQUESTS" here → Branch pipelines will be "test only".
.docker-base:
  tags: [buildah]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
      variables:
        DOCKER_SNAPSHOT_IMAGE: "$CI_REGISTRY_IMAGE/mergerequests/mr-$CI_MERGE_REQUEST_IID:latest"
        DOCKER_BUILD_ARGS: >-
          --platform linux/amd64
          --platform linux/arm64
          --build-arg APP_VERSION=mr-$CI_MERGE_REQUEST_IID-$CI_COMMIT_SHORT_SHA
          --build-arg APP_REVISION=$CI_COMMIT_SHA

    - if: "$CI_COMMIT_TAG"
      when: on_success
      variables:
        DOCKER_BUILD_ARGS: >-
          --platform linux/amd64
          --platform linux/arm64
          --build-arg APP_VERSION=wt-$CI_COMMIT_TAG
          --build-arg APP_REVISION=$CI_COMMIT_SHA

    - when: never

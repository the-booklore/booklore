stages:
  - build
  - test
  - package-build
  - package-test
  - publish
  - mirror

workflow:
  rules:
    # scheduled pipeline: only mirror job should run
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always

    # tag pipeline (e.g. semantic-release created a tag)
    - if: '$CI_COMMIT_TAG'
      when: always

    # merge request pipelines
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

    # normal branch pushes
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always

    - when: never


include:
  # semantic-release (only meaningful on main branch pushes)
  - component: "$CI_SERVER_FQDN/to-be-continuous/semantic-release/gitlab-ci-semrel@4.0"
    inputs:
      changelog-enabled: true
      auto-release-enabled: true

  # docker template
  - component: "$CI_SERVER_FQDN/to-be-continuous/docker/gitlab-ci-docker@8.0"
    inputs:
      trivy-disabled: true
      hadolint-disabled: true
      prod-publish-strategy: "none"
      push-args: "--compression-format zstd --compression-level 20"
      # default snapshot tag (we override for MR via rules below)
      snapshot-image: "$CI_REGISTRY_IMAGE/snapshot:$CI_COMMIT_REF_SLUG"


# -----------------------------
# Tests (run on pushes + MRs)
# -----------------------------
backend_tests:
  stage: test
  image: eclipse-temurin:25-jdk
  tags: [universal]
  script:
    - cd booklore-api
    - ./gradlew test --no-daemon --parallel
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success

frontend_tests:
  stage: test
  image: node:22
  tags: [universal]
  script:
    - cd booklore-ui
    - npm install --force --legacy-peer-deps
    - npx ng test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success


# -----------------------------
# Mirror (schedule only)
# -----------------------------
mirror_from_github:
  stage: mirror
  image: alpine:latest
  tags: [universal]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - when: never

  variables:
    UPSTREAM_BRANCH: "upstream/develop"
    TARGET_BRANCH: "develop"
    SOURCE_BRANCH: "upstream/develop"

  before_script:
    - apk add --no-cache git curl jq

  script:
    # 1) Mirror GitHub develop -> GitLab upstream/develop
    - git clone --branch develop --single-branch https://github.com/booklore-app/booklore.git source
    - cd source
    - git remote add gitlab https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.theprivateserver.de/WorldTeacher/wt-booklore.git
    - git push --force gitlab develop:refs/heads/${UPSTREAM_BRANCH}
    - git push --force gitlab --tags

    # 2) Create or reuse MR upstream/develop -> develop
    - |
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "ERROR: GITLAB_TOKEN is not set. Create a Project Access Token with api scope and add it as CI/CD variable GITLAB_TOKEN."
        exit 1
      fi

      MR_LIST_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=opened&source_branch=${SOURCE_BRANCH}&target_branch=${TARGET_BRANCH}"
      EXISTING_IID="$(curl -sf \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "${MR_LIST_URL}" | jq -r '.[0].iid // empty')"

      if [ -n "$EXISTING_IID" ]; then
        echo "Found existing MR IID: $EXISTING_IID"
        MR_IID="$EXISTING_IID"
      else
        echo "Creating MR ${SOURCE_BRANCH} -> ${TARGET_BRANCH}"
        CREATE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
        MR_IID="$(curl -sf -X POST \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$(jq -n \
            --arg sb "${SOURCE_BRANCH}" \
            --arg tb "${TARGET_BRANCH}" \
            --arg title "Sync upstream: ${SOURCE_BRANCH} → ${TARGET_BRANCH}" \
            --arg desc "Automated mirror from GitHub develop into ${SOURCE_BRANCH}. This MR keeps ${TARGET_BRANCH} up to date." \
            '{source_branch:$sb,target_branch:$tb,title:$title,description:$desc,remove_source_branch:false,squash:false}')" \
          "${CREATE_URL}" | jq -r '.iid')"
        echo "Created MR IID: $MR_IID"
      fi

    # 3) Enable auto-merge (merge when pipeline succeeds)
    - |
      echo "Enabling auto-merge for MR IID: ${MR_IID}"
      MERGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}/merge"
      # This will:
      # - set "merge when pipeline succeeds"
      # - fail gracefully if it's already set, or if merge isn't currently possible
      curl -sf -X PUT \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --data "merge_when_pipeline_succeeds=true" \
        --data "should_remove_source_branch=false" \
        "${MERGE_URL}" \
      || echo "Could not enable auto-merge (may already be enabled, pipeline missing, conflicts, approvals required, or MR not mergeable yet)."



# -----------------------------
# to-be-continuous overrides
# -----------------------------

# Make semantic-release run ONLY on main branch pushes (not MRs, not tags, not schedule)
.semrel-base:
  tags: [universal]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  variables:
    SEMREL_BRANCHES_REF: "^main$"

# Make ALL docker component jobs run ONLY on:
# - merge_request_event (MR snapshot build)
# - tag pipelines (release image build/publish)
.docker-base:
  tags: [buildah]
  rules:
   # Tag pipeline: release build
    - if: '$CI_COMMIT_TAG'
      when: on_success
      variables:
        DOCKER_BUILD_ARGS: >-
          --platform linux/amd64
          --platform linux/arm64
          --build-arg APP_VERSION=$CI_COMMIT_TAG
          --build-arg APP_REVISION=$CI_COMMIT_SHA

    # Branch push that has an open MR: build MR snapshot
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS'
      when: on_success
      variables:
        # No MR IID available in push pipelines → use branch slug or sha
        DOCKER_SNAPSHOT_IMAGE: "$CI_REGISTRY_IMAGE/mr:$CI_COMMIT_REF_SLUG"
        DOCKER_BUILD_ARGS: >-
          --platform linux/amd64
          --platform linux/arm64
          --build-arg APP_VERSION=$CI_COMMIT_REF_SLUG
          --build-arg APP_REVISION=$CI_COMMIT_SHA

    # Optional: also support true merge_request_event pipelines when available
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
      variables:
        DOCKER_SNAPSHOT_IMAGE: "$CI_REGISTRY_IMAGE/mr:$CI_COMMIT_REF_SLUG"
        DOCKER_BUILD_ARGS: >-
          --platform linux/amd64
          --platform linux/arm64
          --build-arg APP_VERSION=$CI_COMMIT_REF_SLUG
          --build-arg APP_REVISION=$CI_COMMIT_SHA

    - when: never